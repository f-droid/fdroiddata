Categories:
  - Calendar & Agenda
License: GPL-3.0-only
AuthorName: Greg Nwosu
SourceCode: https://github.com/gregnwosu/hebrew_calendar
IssueTracker: https://github.com/gregnwosu/hebrew_calendar/issues

AutoName: Hebrew Calendar

RepoType: git
Repo: https://github.com/gregnwosu/hebrew_calendar.git

Builds:
  - versionName: 1.1.2
    versionCode: 4
    commit: eb00f02e35d2c075eee2341175ed1cd9f8b3c3bc
    subdir: flutter
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" ../.github/workflows/tests.yml)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - flutter/.pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: flutter/pubspec.yaml|version:\s+[\d.]+\+(\d+)|.|version:\s+([\d.]+)\+\d+
CurrentVersion: 1.1.2
CurrentVersionCode: 4
