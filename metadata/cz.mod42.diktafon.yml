Builds:
  - versionName: 1.0.8
    versionCode: 92
    commit: 111f504ac450f51fd79f69cc9bb0c1f3d8134bde
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    binary: 
      https://github.com/jaromiru/diktafon/releases/download/v%v/diktafon-%v-android-arm64-v8a.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
    prebuild:
      - flutterVersion=$(sed -n -E 's/.*FLUTTER_VERSION.\s*([0-9.]+).*/\1/p' .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scanignore:
      - assets/models/ggml-silero-v5.1.2.bin
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform
        android-arm64
    ndk: r28c

