Categories:
  - Multimedia
  - Note
  - Writing
License: GPL-3.0-only
AuthorName: Demizo
AuthorEmail: demizodemazo@gmail.com
SourceCode: https://github.com/Demizo/Daily_You
IssueTracker: https://github.com/Demizo/Daily_You/issues
Liberapay: Daily-You

AutoName: Daily You

RepoType: git
Repo: https://github.com/Demizo/Daily_You

Builds:
  - versionName: 2.12.1
    versionCode: 20120011
    commit: e28a40135079ce2026db94197d29386c75cb4e91
    submodules: true
    sudo:
      - mkdir -p /home/demizo/Documents/Repos
      - chown -R vagrant /home/demizo
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-fdroid-release.apk
    binary: 
      https://github.com/Demizo/Daily_You/releases/download/v%v/daily-you-armeabi-v7a-v%v.apk
    rm:
      - ios
      - linux
      - macos
      - windows
    prebuild:
      - export repo=/home/demizo/Documents/Repos/Daily_You
      - cd ..
      - mv com.demizo.daily_you $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - submodules/flutter/bin/flutter config --no-analytics
      - submodules/flutter/bin/flutter packages pub get
      - popd
      - mv $repo com.demizo.daily_you
    scanignore:
      - submodules/flutter/bin/cache
    scandelete:
      - .pub-cache
      - submodules/flutter
    build:
      - export repo=/home/demizo/Documents/Repos/Daily_You
      - cd ..
      - mv com.demizo.daily_you $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - submodules/flutter/bin/flutter build apk --flavor fdroid --release --split-per-abi
        --target-platform="android-arm"
      - popd
      - mv $repo com.demizo.daily_you

