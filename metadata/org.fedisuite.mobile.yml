Builds:
  - versionName: 0.9.19
    versionCode: 9191
    commit: 76b78ba6ff3e688bb5d2068ec67934f2a41858b5
    subdir: android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
    gradle:
      - yes
    prebuild:
      - sed -i '/org.gradle.java.home/d' ../gradle.properties
      - cd ../..
      - export FEDISUITE_ABI_VERSIONCODE_SUFFIX=1
      - sed -i -e '1a "expo":{"autolinking":{"android":{"buildFromSource":[".*"]}}},'
        package.json
      - npm install
      - sed -i -e '/JavaVersion\|jvmToolchain/s/17/21/' node_modules/@react-native/gradle-plugin/*/build.gradle.kts
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
      - npx expo prebuild --platform android --clean
      - sed -i -e '/signingConfig /d' android/app/build.gradle
    scanignore:
      - node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
    scandelete:
      - node_modules
    gradleprops:
      - reactNativeArchitectures=armeabi-v7a

