AutoName: Slow Mail

RepoType: git
Repo: https://github.com/printpagestopdf/slow_mail.git
Binaries: 
  https://github.com/printpagestopdf/slow_mail/releases/download/v%v/app-release.apk

Builds:
  - versionName: 0.9.0
    versionCode: 1
    commit: e1410e79e81e959f3d73c1533338c1cdf2829aa9
    sudo:
      - mkdir -p /home/runner/work/slow_mail
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - export FLUTTER_VERSION=$(cat flutter_version)
      - export repo=/home/runner/work/slow_mail/slow_mail
      - cd ..
      - mv com.theripper.slowmail $repo
      - pushd $repo
      - version=$FLUTTER_VERSION
      - '[[ $version ]]'
      - git -C $$flutter$$ reset --hard $version
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - sed -i -e 's/-Wl,/-Wl,--build-id=none,/' $PUB_CACHE/hosted/pub.dev/jni-*/src/CMakeLists.txt
      - popd
      - mv $repo com.theripper.slowmail
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/slow_mail/slow_mail
      - cd ..
      - mv com.theripper.slowmail $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --no-tree-shake-icons
      - popd
      - mv $repo com.theripper.slowmail
    ndk: r28b

AllowedAPKSigningKeys: caf5ac430eeeb7850fcf3ff5a2ba3398fa4c26b40cf0a69ba1a569b155aeeb65

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
