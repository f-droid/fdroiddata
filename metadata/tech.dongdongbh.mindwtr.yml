MaintainerNotes: |-
  Upstream ships F-Droid-compatible localized metadata in metadata/<locale>/.

  Build notes:
  - Upstream uses env-gated Expo Android source builds via FDROID_EXPO_BUILD_FROM_SOURCE=1, so the stricter F-Droid path does not affect the default IzzyOnDroid flow.
  - FOSS_BUILD=1 strips Google/Firebase/ML Kit deps and pins react_native_dev_server_ip=localhost for reproducibility.
  - The arm64-v8a split APK is used to stay within repository size limits.
  - The F-Droid prebuild removes expo-application's Play Install Referrer dependency while keeping ExpoApplication autolinked; Mindwtr does not use getInstallReferrerAsync.

