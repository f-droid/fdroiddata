    gradle:
      - yes

  - versionName: 1.1.0
    versionCode: 5
    commit: 15071b1fc22ea3982e4e355354db7dab90bfe882
    subdir: app
    gradle:
      - foss
    srclibs:
      - reproducible-apk-tools@v0.3.0
    postbuild:
      - mv $$OUT$$ unaligned.apk
      - $$reproducible-apk-tools$$/zipalign.py --page-size 16 --pad-like-apksigner
        --replace unaligned.apk $$OUT$$

