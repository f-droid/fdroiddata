  - versionName: 1.2.3
    versionCode: 10
    commit: 456d7d31c3c1132131637456dfa236ef3ed23136
    subdir: app
    sudo:
      - export CPUS_MAX=16
      - export CPUS=$(getconf _NPROCESSORS_ONLN)
      - for (( c=$CPUS_MAX; c<$CPUS; c++ )) ; do echo 0 > /sys/devices/system/cpu/cpu$c/online
        ; done
    gradle:
      - foss
    srclibs:
      - reproducible-apk-tools@v0.3.0
    postbuild:
