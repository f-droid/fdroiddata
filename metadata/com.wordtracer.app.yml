    versionCode: 17
    commit: c146347b51b0daf92b7dcc8979b466ef4a7b17a2
    subdir: android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
    gradle:
      - yes
    prebuild:
      - npm ci --prefix ../..
      - npm --prefix ../.. run cap:sync
    scandelete:
      - node_modules

