Builds:
  - versionName: 6.1.1
    versionCode: 60101
    commit: 5d81d00d7d3ed3af91947289f977ffad3cefadcd
    subdir: android/app
    sudo:
      - echo "deb http://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky nodejs npm
    init:
      - cd ../..
      - npm install pnpm@11.13.0 --no-save --no-package-lock
      - ./node_modules/.bin/pnpm install --frozen-lockfile
    gradle:
      - yes
    prebuild:
      - cd ../..
      - CAPACITOR_BUILD=1 ./node_modules/.bin/pnpm exec quasar build
      - ./node_modules/.bin/pnpm exec cap sync android
    scandelete:
      - node_modules

