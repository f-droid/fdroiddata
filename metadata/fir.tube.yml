      - cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 build --release
      - popd
      - mkdir -p src/main/jniLibs/arm64-v8a src/main/jniLibs/armeabi-v7a src/main/jniLibs/x86_64
      - cp src/main/rust/target/aarch64-linux-android/release/libargon_security.so
        src/main/jniLibs/arm64-v8a/
      - cp src/main/rust/target/armv7-linux-androideabi/release/libargon_security.so
        src/main/jniLibs/armeabi-v7a/
      - cp src/main/rust/target/x86_64-linux-android/release/libargon_security.so
        src/main/jniLibs/x86_64/
      - rm -rf src/main/rust/target
    ndk: r27d

