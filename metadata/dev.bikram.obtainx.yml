AutoName: ObtainX

RepoType: git
Repo: https://github.com/bikram-agarwal/ObtainX.git

Builds:
  - versionName: 2.9.0
    versionCode: 39001
    commit: f32909e05b8c0cfe19ed91de265c476d8d2aa0d3
    sudo:
      - mkdir -p /home/runner/work/ObtainX
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-x86_64-fdroid-release.apk
    binary: 
      https://github.com/bikram-agarwal/ObtainX/releases/download/v%v/ObtainX-v%v-fdroid-x86_64.apk
    srclibs:
      - reproducible-apk-tools@v0.3.0
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/^\ *flutter-version:\ (.*)/\1/p" .github/workflows/build.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/home/runner/work/ObtainX/ObtainX
      - cd ..
      - mv dev.bikram.obtainx $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - sed -i 's/signingConfigs\.getByName("release")/signingConfigs.maybeCreate("release")/g'
        android/app/build.gradle.kts
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo dev.bikram.obtainx
    scanignore:
      - assets/translations/package.json
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/ObtainX/ObtainX
      - cd ..
      - mv dev.bikram.obtainx $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-x64"
        --flavor fdroid -t lib/main_fdroid.dart
      - popd
      - mv $repo dev.bikram.obtainx
    postbuild:
      - mv $$OUT$$ unaligned.apk
      - $$reproducible-apk-tools$$/zipalign.py --page-size 16 --pad-like-apksigner
        --replace unaligned.apk $$OUT$$

