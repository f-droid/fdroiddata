Builds:
  - versionName: 0.9.16
    versionCode: 271
    commit: 358ec0749d5631d6df25d1b24e92f913dff72561
    sudo:
      - mkdir -p /home/runner/work/Pocket2FA/
      - chown vagrant /home/runner/work/Pocket2FA/
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/gmag11/Pocket2FA/releases/download/%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release-build-android.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/home/runner/work/Pocket2FA/Pocket2FA
      - cd ..
      - mv net.gmartin.pocket2fa $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo net.gmartin.pocket2fa
    scanignore:
      - .pub-cache
    build:
      - export repo=/home/runner/work/Pocket2FA/Pocket2FA
      - cd ..
      - mv net.gmartin.pocket2fa $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm
      - popd
      - mv $repo net.gmartin.pocket2fa
    ndk: 28.2.13676358

