Builds:
  - versionName: 0.1.2
    versionCode: 3
    commit: 21b73c4b699140e145b83f98134cfdebd8f60cd7
    subdir: app
    sudo:
      - apt-get update
      - apt-get install -y --no-install-recommends autoconf automake clang cmake cpio
        dosfstools file flex g++ libtool lld llvm make mingw-w64 mtools nasm ninja-build
