AutoName: crocson

RepoType: git
Repo: https://github.com/abakum/crocson

Builds:
  - versionName: 1.11.76
    versionCode: 2006
    commit: 1f9616ca44c3ffa5a7267735270062977e2d1b00
    sudo:
      - apt-get update
      - apt-get install -y golang-go
    output: crocson.apk
    binary: https://github.com/abakum/crocson/releases/download/v%v/crocson-arm.apk
    srclibs:
      - go@go1.25.0
      - abakum-fyne-tools@42ed49e021d08a7060bd2ef8cc1f2ebcf1333066
    prebuild: sed -i 's/^Build = .*/Build = $$VERCODE$$/' FyneApp.toml
    build:
      - pushd $$go$$/src
      - ./make.bash
      - popd
      - export GOROOT=$$go$$
      - export GOPATH=$HOME/go
      - export PATH=$GOROOT/bin:$GOPATH/bin:$PATH
      - go version
      - pushd $$abakum-fyne-tools$$/cmd/fyne
      - go install .
      - popd
      - sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - fyne package -os android/arm --release --sign
    ndk: r27d

