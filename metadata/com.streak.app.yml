AutoName: Streak

RepoType: git
Repo: https://github.com/InlitX/streak.git

Builds:
  - versionName: 1.1.0
    versionCode: 21
    commit: 58a0d602f04cbf0f3d455368b60acff648b7ba55
    sudo:
      - mkdir -p /home/runner/work/streak
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: https://github.com/InlitX/streak/releases/download/v%v/Streak-armeabi-v7a.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*FLUTTER_VERSION:\ '(.*)'/\1/p" .github/workflows/build-apk.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - cd ..
      - mv com.streak.app /home/runner/work/streak/streak
      - pushd /home/runner/work/streak/streak
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - sed -i -e 's/-Wl,/-Wl,--build-id=none,/' "$PUB_CACHE"/hosted/pub.dev/jni-*/src/CMakeLists.txt
      - popd
      - mv /home/runner/work/streak/streak com.streak.app
    scandelete:
      - .pub-cache
    build:
      - cd ..
      - mv com.streak.app /home/runner/work/streak/streak
      - pushd /home/runner/work/streak/streak
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --split-debug-info=build/symbols
      - popd
      - mv /home/runner/work/streak/streak com.streak.app

