RepoType: git
Repo: https://github.com/RealNoitasinagro/epoch

Builds:
  - versionName: 1.0.0
    versionCode: 11
    commit: 7730470da92faa98704def38901be8dbc18d83a2
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/RealNoitasinagro/epoch/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - linux
      - web
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutterVersion=$(grep Flutter .flutter-version | cut -d ' ' -f 2)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"

