AutoName: HyleX

RepoType: git
Repo: https://github.com/jenspfahl/hylex

Builds:
  - versionName: 1.0.2
    versionCode: 1000021
    commit: 756869674204424befa69da0974e2e30cc82cac4
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/\ \ flutter:\ ([0-9\.]*)/\1/p" pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter packages pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter packages pub run build_runner build --delete-conflicting-outputs
      - $$flutter$$/bin/flutter clean
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"

