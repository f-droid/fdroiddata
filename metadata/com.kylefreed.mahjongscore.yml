Name: Mahjong Scoring Compass
AutoName: mahjongscore

RepoType: git
Repo: https://gitlab.com/kj7qlv/mahjongscore.git

Builds:
  - versionName: 1.3.5
    versionCode: 171
    commit: 7c3c76cf3f4c0932699d316ba7b98160e22d4a3c
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://gitlab.com/kj7qlv/mahjongscore/-/releases/v%v/downloads/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/^[[:space:]]+flutter:[[:space:]]*([0-9.]+)/\1/p"
        pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter packages pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform android-arm

