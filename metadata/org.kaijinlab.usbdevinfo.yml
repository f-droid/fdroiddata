Categories:
  - Development
  - System
License: GPL-3.0-only
AuthorName: Samy Younsi (KaijinLab/NSLabs)
WebSite: https://neroteam.com
SourceCode: https://github.com/iodn/android-usb-device-info
IssueTracker: https://github.com/iodn/android-usb-device-info/issues
Changelog: https://github.com/iodn/android-usb-device-info/releases

AutoName: USBDevInfo

RepoType: git
Repo: https://github.com/iodn/android-usb-device-info.git

Builds:
  - versionName: 1.0.2
    versionCode: 2
    commit: 83145b0cdfee242482d2d375dfbc7034576a38d7
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PATH=$$flutter$$/bin:$PATH
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutter config --no-analytics
      - flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PATH=$$flutter$$/bin:$PATH
      - export PUB_CACHE=$(pwd)/.pub-cache
      - mkdir -p assets/db
      - python3 tools/build_usbids_db.py
      - flutter build apk --release --target-platform=android-arm64

MaintainerNotes: |
  The USB IDs SQLite database is generated during the build by tools/build_usbids_db.py.

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.2
CurrentVersionCode: 2
