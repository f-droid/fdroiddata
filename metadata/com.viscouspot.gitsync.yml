Categories:
  - Development
License: GPL-3.0-only
AuthorName: ViscousPot
AuthorEmail: viscouspotential@gmail.com
WebSite: https://gitsync.viscouspotenti.al
SourceCode: https://github.com/ViscousPot/GitSync
IssueTracker: https://github.com/ViscousPot/GitSync/issues

AutoName: GitSync

RepoType: git
Repo: https://github.com/ViscousPot/GitSync.git

Builds:
  - versionName: 1.8.55
    versionCode: 18551
    commit: a398867f173b8531ac4cf1f8ea92777f926c0b31
    sudo:
      - mkdir -p /home/runner
      - chown vagrant /home/runner
      - apt-get update
      - apt-get install -y clang libclang-dev cmake make pkg-config libssl-dev rustup
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/ViscousPot/GitSync/releases/download/v%v/app-armeabi-v7a-release-signed.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
    prebuild:
      - export repo=/home/runner/work/GitSync
      - mkdir -p $repo
      - cd ..
      - mv com.viscouspot.gitsync $repo/GitSync
      - pushd $repo/GitSync
      - rustup default 1.88.0
      - flutterVersion=$(sed -n -E "s/^\s+flutter:\ (.*)/\1/p" pubspec.yaml | head
        -1)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PATH="$HOME/.cargo/bin:$$flutter$$/bin:$PATH"
      - export PUB_CACHE=$(pwd)/.pub-cache
      - rustup target add armv7-linux-androideabi
      - cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked
      - cargo install cargo-expand --version 1.0.121 --locked
      - echo 'const oauthRedirectUrl = "gitsync://auth";' > lib/constant/secrets.dart
      - echo 'const gitHubClientId = "Ov23lifj0BGiuwsRpS9V";' >> lib/constant/secrets.dart
      - echo 'const gitHubClientSecret = "9370aafe91536f88b20a041cb140376941c8c59a";'
        >> lib/constant/secrets.dart
      - echo 'const gitHubAppClientId = "Iv23liYhW00bkcw9EuX4";' >> lib/constant/secrets.dart
      - echo 'const gitHubAppClientSecret = "d63e073d3b07de1c86e9ec0b871ab7f60eea15d8";'
        >> lib/constant/secrets.dart
      - echo 'const giteaClientId = "f33ae6b1-a79c-426f-99ff-e8fd299f0a54";' >> lib/constant/secrets.dart
      - echo 'const gitlabClientId = "dd6666081443e81854c2a31b3bbb6dae3a7715338fdbae4bc18f151e5597398c";'
        >> lib/constant/secrets.dart
      - echo 'const codebergClientId = "426db6d5-07df-4ad2-b0bb-5d28d306f9fb";' >>
        lib/constant/secrets.dart
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - rm -rf rust/target
      - popd
      - mv $repo/GitSync com.viscouspot.gitsync
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/GitSync
      - cd ..
      - mv com.viscouspot.gitsync $repo/GitSync
      - pushd $repo/GitSync
      - export PATH="$HOME/.cargo/bin:$$flutter$$/bin:$PATH"
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
      - export CARGO_ENCODED_RUSTFLAGS=$(printf '%s\x1f%s\x1f%s' "--remap-path-prefix=$HOME/.cargo/registry/src=/cargo/registry/src"
        "--remap-path-prefix=$repo/GitSync=." "-Ccodegen-units=1")
      - export SOURCE_DATE_EPOCH=$(git -C $repo/GitSync log -1 --pretty=%ct)
      - flutter_rust_bridge_codegen generate
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - popd
      - mv $repo/GitSync com.viscouspot.gitsync
    ndk: 29.0.13113456

