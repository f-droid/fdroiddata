Builds:
  - versionName: 1.0.3
    versionCode: 31
    commit: 85599841c0495cf3b466f57d5811f59766aa45bc
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/CGH0S7/remail/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - macos
      - linux
      - windows
      - web
    prebuild:
      - export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
      - "flutterVersion=$(sed -n -E \"s/.*flutter-version: '(.*)'/\\1/p\" .github/workflows/release.yml)"
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm
        --no-tree-shake-icons --extra-gen-snapshot-options=--deterministic

