AutoName: Globalsend

RepoType: git
Repo: https://codeberg.org/quandang/global_send.git
Binaries: 
  https://codeberg.org/quandang/global_send/releases/download/v%v/global_send-%c-release.apk

Builds:
  - versionName: 0.2.1
    versionCode: 21000
    commit: 29944f2ec78b0fdcd513cfa77e3c4cfca56d1847
    submodules: true
    sudo:
      - mkdir -p /home/quan
      - chown -R vagrant /home/quan
      - apt-get update
      - apt-get install -y gcc libc-dev rustup
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    rm:
      - ios
      - macos
      - linux
      - windows
    prebuild:
      - export repo=/home/quan/global_send
      - export id=com.peer.topeer.global_send
      - cd ..
      - mv $id $repo
      - pushd $repo
      - export HOME=/home/quan
      - export PUB_CACHE=$(pwd)/.pub-cache
      - .flutter/bin/flutter config --no-analytics
      - .flutter/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo $id
    scanignore:
      - .flutter/bin/cache
    scandelete:
      - .pub-cache
      - .flutter
    build:
      - export repo=/home/quan/global_send
      - export id=com.peer.topeer.global_send
      - cd ..
      - mv $id $repo
      - pushd $repo
      - export HOME=/home/quan
      - rustup default 1.96.0
      - cargo run --features generate-bindings --release --bin regen
      - export PUB_CACHE=$(pwd)/.pub-cache
      - .flutter/bin/flutter build apk --split-per-abi --target-platform="android-arm"
        --build-number $(($$VERCODE$$/10000*10000))
      - popd
      - mv $repo $id

