License: MIT
AuthorName: Claudio Di Maio
AuthorWebSite: https://claudiodimaio.netlify.app/
WebSite: https://github.com/ZiClaud/Iremi-Breathing-App
SourceCode: https://github.com/ZiClaud/Iremi-Breathing-App
IssueTracker: https://github.com/ZiClaud/Iremi-Breathing-App/issues

AutoName: Iremi

RepoType: git
Repo: https://github.com/ZiClaud/Iremi-Breathing-App.git

Builds:
  - versionName: 1.1.15
    versionCode: 1
    commit: v1.1.15
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=3.38.7
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release
    ndk: r27

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.1.15
CurrentVersionCode: 1
