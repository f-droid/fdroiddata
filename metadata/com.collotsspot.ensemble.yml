Categories:
  - Online Media Player
License: MIT
AuthorName: CollotsSpot
SourceCode: https://github.com/CollotsSpot/Ensemble
IssueTracker: https://github.com/CollotsSpot/Ensemble/issues

AutoName: Ensemble

RepoType: git
Repo: https://github.com/CollotsSpot/Ensemble.git

Builds:
  - versionName: 3.0.5
    versionCode: 571
    commit: cb07e55d6979e3e3025beed027439b9f2ccc48c1
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/build-apk.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - sed -i '/aliyun/d' android/build.gradle
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scanignore:
      - .pub-cache
    scandelete:
      - android/init.gradle
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"

