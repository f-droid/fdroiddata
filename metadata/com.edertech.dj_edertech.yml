AntiFeatures:
  NonFreeNet:
    en-US: Downloads playlist and music files from gitlab.com.
Categories:
  - Multimedia
License: MIT
AuthorName: Ederson Duarte Itabaiana
AuthorEmail: djedertechshow@gmail.com
SourceCode: https://gitlab.com/edertech/dj_edertech
IssueTracker: https://gitlab.com/edertech/dj_edertech/issues

AutoName: DJ Edertech

RepoType: git
Repo: https://gitlab.com/edertech/dj_edertech.git

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: 5251c64616d1dcaaa909bc851e9f1d73983d615b
    output: build/app/outputs/apk/release/app-release-unsigned.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
    prebuild:
      - export FLUTTER_VERSION=$(cat flutter_version.txt)
      - '[[ -z $FLUTTER_VERSION ]] && exit 1'
      - pushd $$flutter$$
      - git checkout -f $FLUTTER_VERSION
      - popd
      - sed -i -e '/flutter_barcode_scanner/d' pubspec.yaml
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk

  - versionName: 1.1.0
    versionCode: 2
    disable: https://gitlab.com/ederson-itabaiana/dj_edertech/-/work_items/1
    commit: 86d5b5eadd06dfac3045e428f31b55e82da97ab7
    output: build/app/outputs/apk/release/app-release-unsigned.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
    prebuild:
      - export FLUTTER_VERSION=$(cat flutter_version.txt)
      - '[[ -z $FLUTTER_VERSION ]]'
      - git -C $$flutter$$ checkout -f $FLUTTER_VERSION
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk

  - versionName: 1.1.1
    versionCode: 3
    commit: d60063c94b76109c875cbef481a685d1150d1501
    output: build/app/outputs/apk/release/app-release-unsigned.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
    prebuild:
      - export FLUTTER_VERSION=$(cat flutter_version.txt)
      - '[[ $FLUTTER_VERSION ]]'
      - git -C $$flutter$$ checkout -f $FLUTTER_VERSION
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.1.1
CurrentVersionCode: 3
