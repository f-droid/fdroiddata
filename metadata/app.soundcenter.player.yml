AntiFeatures:
  NonFreeNet:
    en-US: iTunes and PodcastIndex Search API are used for podcast search. GitHub
      API is used to check for new app versions.
Categories:
  - Local Media Player
  - Podcast
License: GPL-3.0-or-later
AuthorName: Ali Zare
AuthorEmail: a.zare.developer@gmail.com
AuthorWebSite: https://github.com/Azare77
SourceCode: https://github.com/Azare77/sound_center
IssueTracker: https://github.com/Azare77/sound_center/issues

AutoName: Sound Center

RepoType: git
Repo: https://github.com/Azare77/sound_center.git

Builds:
  - versionName: 1.0.0-beta.4
    versionCode: 11
    commit: 28d42896701d0188207a8b845913d10b88bb91fd
    sudo:
      - mkdir -p /home/runner/work/sound_center
      - chown -R vagrant /home/runner/work
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/Azare77/sound_center/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/flutter-release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/home/runner/work/sound_center/sound_center
      - cd ..
      - mv app.soundcenter.player $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo app.soundcenter.player
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/sound_center/sound_center
      - cd ..
      - mv app.soundcenter.player $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - popd
      - mv $repo app.soundcenter.player

