AuthorName: Adil Hanney
SourceCode: https://github.com/adil192/no_more_background
IssueTracker: https://github.com/adil192/no_more_background/issues
Translation: https://hosted.weblate.org/engage/no_more_background/
Donate: https://github.com/sponsors/adil192
Liberapay: adil192

AutoName: no_more_background

RepoType: git
Repo: https://github.com/adil192/no_more_background.git

Builds:
  - versionName: 2.3.1
    versionCode: 2030101
    commit: f4ee9cbb28c3815f6a8664d2ae388c83871d6edc
    submodules: true
    sudo:
      - apt-get update
      - apt-get install -y gcc libc-dev
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    rm:
      - .github
      - .zed
      - .vscode
      - flatpak
      - linux
      - macos
      - submodules/Delta-Icons
      - submodules/lineage_wiki
      - windows
    prebuild:
      - ./patches/remove_dev_dependencies.sh
      - export PUB_CACHE=$(pwd)/.pub-cache
      - ./submodules/flutter/bin/flutter config --no-analytics
      - ./submodules/flutter/bin/flutter pub get
    scanignore:
      - submodules/flutter/bin/cache
    scandelete:
      - submodules
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - ./submodules/flutter/bin/flutter build apk --split-per-abi --target-platform="android-arm"

