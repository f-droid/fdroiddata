Builds:
  - versionName: 1.8.2
    versionCode: 231
    commit: da6f7e9cecda38a790fda7d03e2b68f07fa5cbb9
    sudo:
      - mkdir -p /home/runner
      - chown vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/gmag11/Paperless_ngx_uploader/releases/download/%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/build-release-apks.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/home/runner/work/Paperless_ngx_uploader
      - mkdir -p $repo
      - cd ..
      - mv net.gmartin.paperlessngx_uploader $repo/Paperless_ngx_uploader
      - pushd $repo/Paperless_ngx_uploader
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - popd
      - mv $repo/Paperless_ngx_uploader net.gmartin.paperlessngx_uploader
    scanignore:
      - .pub-cache
      - AppIcons.zip
    build:
      - export repo=/home/runner/work/Paperless_ngx_uploader
      - cd ..
      - mv net.gmartin.paperlessngx_uploader $repo/Paperless_ngx_uploader
      - pushd $repo/Paperless_ngx_uploader
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm
      - popd
      - mv $repo/Paperless_ngx_uploader net.gmartin.paperlessngx_uploader
    ndk: 27.0.12077973

