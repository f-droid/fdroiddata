Builds:
  - versionName: 1.5.5
    versionCode: 34
    commit: 071e4ca69ec05b73f0d67a5183f67de0d3c182b4
    timeout: 36000
    sudo:
      - apt-get update
      - apt-get install -y python3-requests nodejs npm make libc-dev cmake golang-go
        gcc-multilib g++-multilib unzip wget libssl-dev zlib1g-dev libbz2-dev libreadline-dev
        libsqlite3-dev libncurses-dev libffi-dev liblzma-dev
    output: android/app/build/outputs/apk/release/app-release-unsigned.apk
    srclibs:
      - esbuild@v0.24.0
      - NodejsMobile@v18.20.4
      - firebase-stub@4ae5aec1bf1fc3f2dfbc8e545b00b83d8a15dab8
    rm:
      - patches/react-native-blurhash+2.1.2.patch
    prebuild:
      - sed -i -e '1a "expo":{"autolinking":{"android":{"buildFromSource":[".*"]}}},'
        package.json
      - sed -i -e '/JavaVersion\|jvmTarget/s/17/21/' modules/file-utils/android/build.gradle
      - npm install --legacy-peer-deps --loglevel=error
      - sed -i -e '/JavaVersion\|jvmToolchain/s/17/21/' node_modules/@react-native/gradle-plugin/*/build.gradle.kts
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
      - sed -i -e '/firebase/d' node_modules/expo-notifications/android/build.gradle
      - cp -a $$firebase-stub$$/firebase-messaging/src node_modules/expo-notifications/android
      - npm install expo-application --legacy-peer-deps --loglevel=error
      - sed -i '/installreferrer/d' node_modules/expo-application/android/build.gradle
      - sed -i -e '/import com.android.installreferrer/d' -e '/import android.os.RemoteException/d'
        -e '/getInstallReferrerAsync/,/^    }$/d' 
        node_modules/expo-application/android/src/main/java/expo/modules/application/ApplicationModule.kt
      - APP_VARIANT=production npx expo prebuild --platform android --clean
      - sed -i -e 's/ android:extractNativeLibs="[^"]*"//' -e 's/<application/<application
        android:extractNativeLibs="true"/' android/app/src/main/AndroidManifest.xml
      - rm -rf nodejs-assets/nodejs-project/node_modules/sql.js/dist
      - rm -rf 
        android/app/src/main/assets/nodejs-assets/nodejs-project/node_modules/sql.js/dist
      - sed -i '/defaultConfig {/a ndk { abiFilters "arm64-v8a", "armeabi-v7a" }'
        android/app/build.gradle
      - echo 'android.ndk.abiFilters=arm64-v8a,armeabi-v7a' >> android/gradle.properties
      - rm -fr ios
      - sed -i -e '/signingConfig /d' android/app/build.gradle
      - sed -i -e '/exclude group.*installreferrer/d' android/app/build.gradle
      - sed -i "/abiFilters/d" node_modules/nodejs-mobile-react-native/android/build.gradle
      - sed -i '/defaultConfig {/a ndk { abiFilters "arm64-v8a", "armeabi-v7a" }'
        node_modules/nodejs-mobile-react-native/android/build.gradle
      - sed -i '/ndkVersion/a \    androidResources {\n ignoreAssetsPattern "!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~"\n    }'
        node_modules/nodejs-mobile-react-native/android/build.gradle
      - sed -i 's/\.build()$/\.build().toMutableMap()/' 
        node_modules/react-native-blurhash/android/src/main/java/com/mrousavy/blurhash/BlurhashViewManager.kt
      - echo -e 'org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m\norg.gradle.workers.max=2'
        >> android/gradle.properties
      - sed -i -e 's/acceptable_pythons = .*/acceptable_pythons = ((3, 13),)/' $$NodejsMobile$$/{android-configure,configure}
    scanignore:
      - node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
      - node_modules/expo-modules-autolinking/scripts/android/autolinking_implementation.gradle
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
      - node_modules/react-native-pager-view/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
    scandelete:
      - node_modules
    build:
      - pushd $$esbuild$$
      - make esbuild > /dev/null
      - popd
      - mkdir -p node_modules/@esbuild/linux-x64/bin
      - mkdir -p node_modules/esbuild/bin
      - cp $$esbuild$$/esbuild node_modules/@esbuild/linux-x64/bin/
      - cp $$esbuild$$/esbuild node_modules/esbuild/bin/esbuild
      - pushd $$NodejsMobile$$
      - ./tools/android_build.sh $$NDK$$ 24 arm64 > /dev/null 2>&1
      - ./tools/android_build.sh $$NDK$$ 24 arm > /dev/null 2>&1
      - popd
      - cp -a $$NodejsMobile$$/out_android/* node_modules/nodejs-mobile-react-native/android/libnode/bin
      - cd android/app
      - gradle assembleRelease
    ndk: 27.0.12077973

