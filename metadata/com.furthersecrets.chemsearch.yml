MaintainerNotes: |-
  The F-Droid flavor disables GitHub APK update checks and removes the
  REQUEST_INSTALL_PACKAGES and POST_NOTIFICATIONS permissions.

  AI description providers are kept as optional user-configured features.
  They require user-supplied API keys and connect to non-free network services,
  so this metadata declares NonFreeNet.

