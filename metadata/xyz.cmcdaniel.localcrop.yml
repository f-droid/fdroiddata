Builds:
  - versionName: 1.0.0
    versionCode: 2
    commit: 1342baca60a54175f7a77b7fc8997889d1f56db4
    subdir: android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
    gradle:
      - yes
    prebuild:
      - cd ../..
      - sed -i '/org.gradle.java.home/d' android/gradle.properties
      - npm install
      - npm run build
      - npx cap sync android
    scandelete:
      - node_modules

  - versionName: 1.0.1
    versionCode: 3
    commit: a798c8f4a392a63e51aea8543af64d9ac4057849
    subdir: android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
    gradle:
      - yes
    prebuild:
      - cd ../..
      - sed -i '/org.gradle.java.home/d' android/gradle.properties
      - npm install
      - npm run build
      - npx cap sync android
    scanignore:
      - data/*.geojson.gz
    scandelete:
      - node_modules

  - versionName: 1.1.0
    versionCode: 4
    commit: d3a5e386041eb6567e56399d7b55fcab1cb9969f
    subdir: android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
    gradle:
      - yes
    prebuild:
      - cd ../..
      - sed -i '/org.gradle.java.home/d' android/gradle.properties
      - npm install
      - npm run build
      - npx cap sync android
    scanignore:
      - android/app/src/main/assets/public/data/*.geojson.gz
      - data/*.geojson.gz
      - dist/data/*.geojson.gz
    scandelete:
      - node_modules

