Builds:
  - versionName: 0.1.0
    versionCode: 1
    commit: 72e37d2dac501faa300ca895c56c53eea43ae4ae
    subdir: app
    sudo:
      - apt-get update
      - apt-get install -y --no-install-recommends make g++ golang-go
    gradle:
      - yes
    srclibs:
      - go@go1.25.0
    build:
      - pushd $$go$$/src
      - GOROOT_BOOTSTRAP=$(go env GOROOT) ./make.bash
      - popd
      - export GOROOT=$$go$$
      - export PATH="$GOROOT/bin:$PATH"
      - sh ../rsync/build.sh
      - sh ../rsh/build.sh
    ndk: r27c

