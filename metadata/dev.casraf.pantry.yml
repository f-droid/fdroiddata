Categories:
  - Cloud Storage & File Sync
  - Note
  - Shopping List
  - Task
License: MIT
AuthorName: Chen Asraf
AuthorEmail: contact@casraf.dev
WebSite: https://casraf.dev
SourceCode: https://github.com/chenasraf/pantry-flutter
IssueTracker: https://github.com/chenasraf/pantry-flutter/issues

Name: Nextcloud Pantry
AutoName: Pantry

RepoType: git
Repo: https://github.com/chenasraf/pantry-flutter.git

Builds:
  - versionName: 0.13.0
    versionCode: 271
    commit: 9fdee69cb968dd3a1079c3b768c84bf518a5df23
    sudo:
      - mkdir -p /home/runner/work/pantry-flutter
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/chenasraf/pantry-flutter/releases/download/v%v/pantry-%v-armeabi-v7a.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export repo=/home/runner/work/pantry-flutter/pantry-flutter
      - cd ..
      - mv dev.casraf.pantry $repo
      - pushd $repo
      - flutterVersion=$(cat .flutter-version)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - sed -i -e 's/-Wl,/-Wl,--build-id=none,/' .pub-cache/hosted/pub.dev/jni-*/src/CMakeLists.txt
      - popd
      - mv $repo dev.casraf.pantry
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/pantry-flutter/pantry-flutter
      - cd ..
      - mv dev.casraf.pantry $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - popd
      - mv $repo dev.casraf.pantry

