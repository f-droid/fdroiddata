AntiFeatures:
  NonFreeNet:
    en-US: Depends on Rain Viewer (https://www.rainviewer.com) for weather radar
  TetheredNet:
    en-US: Depends on Open-Meteo (https://open-meteo.com) for weather forecasts; Rain
      Viewer (https://www.rainviewer.com) for weather radar metadata and animated
      radar map tiles; OpenFreeMap (https://openfreemap.org) for base map styles,
      vector tiles, fonts, and sprites; Postpass (https://postpass.geofabrik.de) for
      nearby points of interest—Geofabrik’s SQL API over OpenStreetMap-derived data
      (the same map database behind community POI queries; see the Overpass API overview
      at https://wiki.openstreetmap.org/wiki/Overpass_API). The app calls Postpass
      at https://postpass.geofabrik.de/api/0.2/interpreter. Photon (https://photon.komoot.io)
      powers search / geocoding (turning place names and addresses into map locations).
