Donate: https://paypal.me/raulmoralesruiz

AutoName: Kefir Control

RepoType: git
Repo: https://github.com/raulmoralesruiz/kefir-control.git

Builds:
  - versionName: 1.1.0
    versionCode: 21
    commit: 49539a29f534a3eef00563def5d08761d700f0d8
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*revision:\ \"(.*)\"/\1/p" .metadata)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

  - versionName: 1.1.0
