Builds:
  - versionName: 1.0.0
    versionCode: 11
    commit: 6e290b9739e17eaa2bb998d85da410b4edb16c8a
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://gitlab.com/avionix/tirailleur/-/releases/v%v/downloads/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - FLUTTER_VERSION=$(sed -n -E 's/^flutter\s+(\S+)/\1/p' .tool-versions)
      - '[[ $FLUTTER_VERSION ]]'
      - git -C $$flutter$$ checkout -f $FLUTTER_VERSION
      - cd ..
      - mv com.bupkis.tirailleur /tmp/build
      - pushd /tmp/build
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - popd
      - mv /tmp/build com.bupkis.tirailleur
    scandelete:
      - .pub-cache
    build:
      - cd ..
      - mv com.bupkis.tirailleur /tmp/build
      - pushd /tmp/build
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - popd
      - mv /tmp/build com.bupkis.tirailleur

