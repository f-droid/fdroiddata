AutoName: Trayzero

RepoType: git
Repo: https://github.com/roman10/trayzero.git

Builds:
  - versionName: 1.0.2
    versionCode: 341
    commit: a533256f6cce52576b1a5b27e6357ee522dfdb52
    submodules: true
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    rm:
      - ios
    prebuild:
      - bash tool/foss/strip.sh
      - sed -i 's/includeInApk = !project.hasProperty("fdroid")/includeInApk = false/'
        android/app/build.gradle.kts
      - sed -i 's/signingConfigs.getByName("debug")/null/' android/app/build.gradle.kts
      - export PUB_CACHE=$(pwd)/.pub-cache
      - submodules/flutter/bin/flutter config --no-analytics
      - submodules/flutter/bin/flutter pub get
    scanignore:
      - submodules/flutter/bin/cache
    scandelete:
      - submodules/flutter
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - submodules/flutter/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

