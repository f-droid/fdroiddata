Categories:
  - Remote Access
License: Apache-2.0
AuthorName: Grzegorz Witkowski
AuthorEmail: gwitko@proton.me
AuthorWebSite: https://github.com/gwitko
SourceCode: https://github.com/gwitko/Conduit
IssueTracker: https://github.com/gwitko/Conduit/issues
Changelog: https://github.com/gwitko/Conduit/releases
Donate: https://ko-fi.com/gwitko

AutoName: Conduit

RepoType: git
Repo: https://github.com/gwitko/Conduit.git

Builds:
  - versionName: 1.0.0
    versionCode: 41
    commit: c326759f51322c4330335b2c7b31e121ab0e5a64
    sudo:
      - mkdir -p /home/runner/work/Conduit
      - chown -R vagrant /home/runner/work
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/gwitko/Conduit/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/home/runner/work/Conduit/Conduit
      - cd ..
      - mv com.gwitko.conduit $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo com.gwitko.conduit
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/Conduit/Conduit
      - cd ..
      - mv com.gwitko.conduit $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - popd
      - mv $repo com.gwitko.conduit

