Builds:
  - versionName: B0.0.5
    versionCode: 51
    commit: 9010d6f2cb0b9422878de50a9fbfdc7713538b17
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    init:
      - cd ../..
      - npm install
    gradle:
      - yes
    output: build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
    prebuild:
      - cd ../..
      - sed -i '/jvmToolchain\|JavaVersion/s/17/21/' node_modules/@react-native/gradle-plugin/*/build.gradle.kts
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
        node_modules/react-native-notify-kit/android/build.gradle
      - sed -i 's/jvmTarget = "17"/jvmTarget = "21"/g' node_modules/react-native-notify-kit/android/build.gradle
      - echo "reactNativeRootDir=node_modules/react-native" >> android/gradle.properties
      - echo "reactNativePath=node_modules/react-native" >> android/gradle.properties
      - echo "mavenRepo.url=https://repo.maven.apache.org/maven2" >> android/gradle.properties
      - npx react-native bundle --platform android --dev false --entry-file index.js
        --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest
        android/app/src/main/res/
    scanignore:
      - node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/@react-native-cookies/cookies/android/build.gradle
      - node_modules/@react-native-picker/picker/android/build.gradle
      - node_modules/react-native-linear-gradient/android/build.gradle
      - node_modules/react-native-reanimated/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/react-native-system-navigation-bar/android/build.gradle
      - node_modules/react-native-webview/android/build.gradle
      - node_modules/react-native-vector-icons/android/build.gradle
      - node_modules/react-native-calendars/node_modules/react-native-safe-area-context/android/build.gradle
    scandelete:
      - node_modules
    gradleprops:
      - BUILD_ABI=armeabi-v7a

