AntiFeatures:
  NonFreeAdd:
    en-US: Pro features require a one-time payment via bitbag.app
  NonFreeNet:
    en-US: Price data from CoinGecko, Kraken, mempool.space, and Bitfinex; wallet
      scanning via Esplora
Categories:
  - Money
License: GPL-3.0-only
AuthorName: UXAVIA
WebSite: https://bitbag.app
SourceCode: https://github.com/UXAVIA/bag
IssueTracker: https://github.com/UXAVIA/bag/issues

AutoName: Bag

RepoType: git
Repo: https://github.com/UXAVIA/bag

Builds:
  - versionName: 1.2.7
    versionCode: 271
    commit: 3b66ee4990c011485cc44b783ba5e4c42de8b237
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(cat .flutter-version)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter pub get
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
        --dart-define=FLAVOR=direct
    ndk: 27.0.12077973

