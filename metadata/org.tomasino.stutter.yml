Builds:
  - versionName: 1.3.1
    versionCode: 25
    commit: 98e90a42eef3511048db554c5217aba68ae0f2b2
    subdir: app
    gradle:
      - yes
    postbuild:
      - curl -Lo upstream.apk 
        https://github.com/jamestomasino/stutter-android/releases/download/v$$VERSION$$/app-release-signed.apk
      - unzip -q upstream.apk -d apk
      - export hash_prof=$(sha256sum apk/assets/dexopt/baseline.prof)
      - export hash_profm=$(sha256sum apk/assets/dexopt/baseline.profm)
      - rm -rf apk upstream.apk
      - for i in {1..10}; do unzip -q $$OUT$$ -d apk; sha256sum -c - <<< $hash_prof
        && sha256sum -c - <<< $hash_profm && break; sha256sum apk/assets/dexopt/baseline.prof;
        sha256sum apk/assets/dexopt/baseline.profm; rm -fr apk; gradle clean assembleRelease;
        done

