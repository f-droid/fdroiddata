Builds:
  - versionName: '1.5'
    versionCode: 3
    commit: bf6ae7e3fcd2a3a9a3072bfa4ff56e8aff553f6a
    subdir: android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
    gradle:
      - yes
    prebuild:
      - cd ../..
      - npm install
      - npm run build
      - npx cap sync android
    scandelete:
      - node_modules

