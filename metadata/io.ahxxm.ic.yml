MaintainerNotes: |-
  App relies on MozJPEG and Jpegli libraries, it uses ABI splits
  with versionCode = baseVersion * 10 + abiCode, where
  abiCodes: universal=0, armeabi-v7a=1, arm64-v8a=2, x86=3, x86_64=4.

AutoUpdateMode: Version +.0 v%v
UpdateCheckMode: Tags
VercodeOperation:
  - '%c * 10 + 1'
  - '%c * 10 + 2'
  - '%c * 10 + 3'
  - '%c * 10 + 4'
UpdateCheckData: app/build.gradle.kts|val baseVersion = (\d+)|.|val baseVersion =
  (\d+)
