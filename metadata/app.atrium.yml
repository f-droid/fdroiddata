SourceCode: https://github.com/retransmit/Atrium
IssueTracker: https://github.com/retransmit/Atrium/issues
Changelog: https://github.com/retransmit/Atrium/releases

AutoName: Atrium

RepoType: git
Repo: https://github.com/retransmit/Atrium.git

Builds:
  - versionName: 1.1.1
    versionCode: 101
    commit: c969ef593e86bda206b0342389f1ed30922e5faa
    subdir: app
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/retransmit/Atrium/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/^  FLUTTER_VERSION:\ (.*)$/\1/p" ../.github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - cd ../..
      - mv app.atrium /tmp/build
      - pushd /tmp/build/app
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export PATH=$$flutter$$/bin:$PATH
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - cd .. && $$flutter$$/bin/dart run tool/build_all.dart
      - popd
      - mv /tmp/build app.atrium
    scandelete:
      - app/.pub-cache
    build:
      - cd ../..
      - mv app.atrium /tmp/build
      - pushd /tmp/build/app
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm
      - popd
      - mv /tmp/build app.atrium

