RepoType: git
Repo: https://github.com/evcc-io/app.git

Builds:
  - versionName: 1.0.3
    versionCode: 27
    disable: key change
    commit: c22ddb1b81f3abd0e55804e7430137e13a0182b1
    sudo:
      - sysctl fs.inotify.max_user_watches=524288 || true
      - apt-get update
      - apt-get install npm
    init: npm install --build-from-source
    output: android/app/build/outputs/apk/release/*.apk
    prebuild: npx expo prebuild --platform android --clean
    scanignore:
      - android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
      - node_modules/react-native-webview/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
      - node_modules/expo-modules-autolinking/scripts/android/autolinking_implementation.gradle
      - node_modules/expo-dev-launcher/android/build.gradle
      - node_modules/expo-dev-menu/android/build.gradle
    scandelete:
      - node_modules
    build:
      - cd android/app
      - sed -i -e '/signingConfig /d' build.gradle
      - gradle assembleRelease

  - versionName: 1.0.4
    versionCode: 29
    disable: lint error
    commit: bcfdec2295e24ba0e5bfaddbc15b465458b43c7f
    sudo:
      - sysctl fs.inotify.max_user_watches=524288 || true
      - apt-get update
      - apt-get install npm
    init: npm install --build-from-source
    output: android/app/build/outputs/apk/release/*.apk
    prebuild:
      - sed -i -e '/"expo":\ {/a "autolinking":{"android":{"buildFromSource":[".*"]}},'
        package.json
      - npx expo prebuild --platform android --clean
    scanignore:
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
      - node_modules/react-native-webview/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
      - node_modules/expo-modules-autolinking/scripts/android/autolinking_implementation.gradle
      - node_modules/expo-dev-launcher/android/build.gradle
      - node_modules/expo-dev-menu/android/build.gradle
      - node_modules/react-native-edge-to-edge/android/build.gradle
    scandelete:
      - node_modules
    build:
      - cd android/app
      - sed -i -e '/signingConfig /d' build.gradle
      - gradle assembleRelease

  - versionName: 1.3.3
    versionCode: 41
    commit: a96bd65da72f485bd0d54716a0af3647e9f901d0
    sudo:
      - apt-get update
      - apt-get install npm
      - echo "deb https://deb.debian.org/debian bookworm main" > /etc/apt/sources.list.d/bookworm.list
      - apt-get update
      - apt-get install -y -t bookworm openjdk-17-jdk-headless
      - update-java-alternatives -s java-1.17.0-openjdk-amd64
    init:
      - npm remove expo-camera expo-dev-client
      - npm ci
    output: android/app/build/outputs/apk/release/*.apk
    prebuild:
      - sed -i '/^\s*\[$/{ N; /\n\s*"expo-camera"/{ :loop; N; /\],$/!b loop; d } }'
        app.config.ts
      - sed -i -e '/"expo":\ {/a "autolinking":{"android":{"buildFromSource":[".*"]}},'
        package.json
      - touch fdroid-build
      - npx expo prebuild --platform android --clean
    scanignore:
      - node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
      - node_modules/react-native-launch-arguments/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
      - node_modules/react-native-keyboard-controller/android/build.gradle
      - node_modules/react-native-webview/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/react-native-edge-to-edge/android/build.gradle
    scandelete:
      - node_modules
    build:
      - cd android/app
      - sed -i -e '/signingConfig /d' build.gradle
      - gradle assembleRelease

AutoUpdateMode: None
UpdateCheckMode: None
UpdateCheckData: app.config.ts|versionCode:\s(\d+)|.|version:\s"([\d.]+)"
CurrentVersion: 1.3.3
CurrentVersionCode: 41
