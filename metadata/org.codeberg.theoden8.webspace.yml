  - versionName: 0.2.4
    versionCode: 19001
    commit: 167fb09f190c9b9c5d45fea0ad4812f8dc9d74e4
    sudo:
      - apt-get update
      - apt-get install -y gcc libc-dev rustup
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-fdroid-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - rustVersion=$(sed -n -E 's/channel = "(.*)"/\1/p' rust-toolchain.toml)
      - '[[ $rustVersion ]]'
      - cargoNdkVersion=$(sed -E -n 's/.*CARGO_NDK_VERSION.*"(.*)".*/\1/p' .github/workflows/build-and-test.yml)
      - '[[ $cargoNdkVersion ]]'
      - rustup default "$rustVersion"
      - rustup target add armv7-linux-androideabi
      - cargo install --locked "cargo-ndk@$cargoNdkVersion"
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/build-and-test.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
