AntiFeatures:
  NonFreeNet:
    en-US: Rely on DuckDuckGo and Google for website icons.
Categories:
  - Internet
License: MIT
AuthorName: theoden8
SourceCode: https://github.com/theoden8/webspace_app
IssueTracker: https://github.com/theoden8/webspace_app/issues

AutoName: Webspace

RepoType: git
Repo: https://github.com/theoden8/webspace_app

Builds:
  - versionName: 0.1.8
    versionCode: 14001
    commit: eeb29f8ce95fa35336ee18151f57251ccd8851a1
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-fdroid-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/build-and-test.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter packages pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --flavor fdroid --split-per-abi --target-platform="android-arm"
    ndk: 28.2.13676358

