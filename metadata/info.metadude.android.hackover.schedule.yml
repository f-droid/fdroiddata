AutoName: Hackover Fahrplan
Description: |
  Programm App für das Hackover.

  https://hackover.de

  Das Hackover ist ein jährlich stattfindendes Geekend für Erfas,
  ChaosTreffs und Hackspaces sowie chaosnahen Menschen.

  Dich erwartet ein entspanntes Wochenende mit Vorträgen und Workshops.
  Allerdings ist dies nicht so dicht gepackt wie z.B. auf dem Chaos
  Communication Congress, so dass genug Zeit dazwischen bleibt, um sich
  mit anderen auszutauschen, Projekte anzuschauen(oder auch
  anzufassen) - oder das eigene Projekt zu zeigen. Deswegen wird es auch
  nur zwei Räume mit Workshops und Vorträgen geben.

  Hauptsächlich geht es darum, Menschen und ihre Projekte kennenzulernen,
  gemeinsam zu basteln und Ideen zu tauschen. Ein lockeres Vortragsprogramm
  bietet den Rahmen dafür.

  <b>Funktionen:</b>
  * Tagesüberblick über alle Programmpunkte (Vorträge, Workshop, Lounge)
  * Beschreibung von Veranstaltungen lesen
  * Veranstaltungen in persönlicher Favoritenliste verwalten
  * Alle Veranstaltungen durchsuchen
  * Favoritenliste exportieren
  * Alarm für Veranstaltungen setzen
  * Veranstaltungen in Kalender eintragen
  * Link zu Veranstaltungen mit anderen teilen
  * Programmänderungen einsehen
  * Bewertungen und Kommentare für Vorträge und Workshops hinterlassen
  * Integration mit dem Engelsystem-Projekt https://engel.events.ccc.de - Online-Tool für Helfer- und Schichtplanung auf großen Events
  * Integration mit Chaosflix https://github.com/NiciDieNase/chaosflix - Android App für https://media.ccc.de, teile Fahrplan-Favoriten mit Chaosflix und importiere sie als Bookmarks

  🔤 <b>Unterstützte Sprachen</b>
  (Programmtexte ausgenommen)
  * Dänisch
  * Deutsch
  * Deutsch, Österreich
  * Englisch
  * Finnisch
  * Französisch
  * Italienisch
  * Japanisch
  * Litauisch
  * Niederländisch
  * Polnisch
  * Portugiesisch, Brasilien
  * Portugiesisch, Portugal
  * Russisch
  * Spanisch
  * Schwedisch
  * Türkisch

  🤝 Du kannst mithelfen, die App zu übersetzen. Siehe Link hier.

  💡 Inhaltliche Fragen zum Programm kann nur das Hackover-Content-Team
  beantworten. Diese App stellt lediglich das Programm zur Verfügung.

  💣 Fehlerberichte sind herzlich willkommen, aber achte darauf,
  dass du erklärst, wie man den Fehler reproduzieren kann. Bitte
  nutze den Issue-Tracker: https://github.com/EventFahrplan/EventFahrplan/issues.

  🏆 Die App basiert auf der <b>EventFahrplan-App</b>
  https://play.google.com/store/apps/details?id=info.metadude.android.congress.schedule
  für den Kongress des Chaos Computer Clubs. Der Quellcode der Anwendung ist auf GitHub
  https://github.com/johnjohndoe/CampFahrplan/tree/hackover-2026 zu finden.

  🎨 Logo-Design von Zichy

