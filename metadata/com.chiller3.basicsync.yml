  https://github.com/chenxiaolong/BasicSync/releases/download/v%v/BasicSync-%v-arm64-v8a-release.apk

Builds:
  - versionName: '1.18'
    versionCode: 70144
    commit: 0c91607795d589c64646f50ca60a99d02af8db15
    subdir: app
    submodules: true
    sudo:
      - apt-get update
      - apt-get install -y golang-go
    gradle:
      - yes
    prebuild:
      - sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - sed -i -e 's|-target=android|-target=android/arm64|' -e 's/include(.*)/include("arm64-v8a")/'
        build.gradle.kts
      - sed -i -e '/bootgo/s/1.24.6/1.24.4/' ../external/go/src/make.*
      - sed -i -e '/minBootstrap/s/1.24.6/1.24.4/' ../external/go/src/cmd/dist/buildtool.go
    scanignore:
      - external/go/lib/fips140/*.zip
      - external/go/lib/time/zoneinfo.zip
    scandelete:
      - external/go/src
      - external/syncthing/lib/model/testdata/tmpfile
    build: gradle stbridge
    ndk: r29

