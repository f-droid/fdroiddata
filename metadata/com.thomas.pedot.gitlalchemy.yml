AutoName: Gitlalchemy

RepoType: git
Repo: https://gitlab.com/thomas.pedot1/gitlalchemy.git

Builds:
  - versionName: 1.2.2
    versionCode: 10020021
    commit: d10a2d03d9281d134ec5c20e73889ca4f5874a86
    sudo:
      - apt-get update
      - apt-get install -y gcc libc-dev rustup
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
      - npm install -g pnpm@10.33.0
    init:
      - rustup default 1.82
      - rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android
        x86_64-linux-android
      - cargo install tauri-cli@2.10.1 --locked
      - export PATH="$HOME/.cargo/bin:$PATH"
      - export ANDROID_HOME=$$SDK$$
      - export NDK_HOME=$$NDK$$
      - cd apps/desktop
      - cargo tauri android init
    output: 
      apps/desktop/src-tauri/gen/android/app/build/outputs/apk/arm/release/app-arm-release-unsigned.apk
    prebuild:
      - sed -i 's|"bun run build"|"npm run build"|g' apps/desktop/src-tauri/tauri.conf.json
      - sed -i '/"packageManager"/d' package.json
      - cp -r apps/desktop/src-tauri/icons/android/. apps/desktop/src-tauri/gen/android/app/src/main/res/
      - sed -i 's|\.toInt()$|.toInt() * 10 + 1|' apps/desktop/src-tauri/gen/android/app/build.gradle.kts
      - sed -i -e '/signingConfigs/,/^    }/d' -e '/signingConfig = /d' apps/desktop/src-tauri/gen/android/app/build.gradle.kts
      - echo -e 'packages:\n  - "apps/*"\n  - "packages/*"' > pnpm-workspace.yaml
    build:
      - export PATH="$HOME/.cargo/bin:$PATH"
      - export ANDROID_HOME=$$SDK$$
      - export NDK_HOME=$$NDK$$
      - pnpm install
      - cd apps/desktop
      - cargo tauri android build --apk --split-per-abi --target armv7
    ndk: r26d

