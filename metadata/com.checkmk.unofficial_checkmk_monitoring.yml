Builds:
  - versionName: 1.1.1
    versionCode: 211
    commit: 12d3ef79cdc11c031caeef963bbd521346a8643d
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://git.pabr.de/apps/unofficial_checkmk_monitoring/-/releases/v%v/downloads/app-armeabi-v7a-release-v%v.apk
    srclibs:
      - flutter@stable
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export SOURCE_DATE_EPOCH=1
      - flutterVersion=$(sed -n -E 's/.*"flutter":\s*"([^"]+)".*/\1/p' .fvmrc)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export SOURCE_DATE_EPOCH=1
      - echo "fdroidBuild=true" >> local.properties
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
    ndk: r28c

