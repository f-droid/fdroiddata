Categories:
  - Health Manager
License: Apache-2.0
AuthorName: Private By Design
SourceCode: https://gitlab.com/martynbutty/healthTracker
IssueTracker: https://gitlab.com/martynbutty/healthTracker/-/issues

AutoName: Albi

RepoType: git
Repo: https://gitlab.com/martynbutty/healthTracker.git

Builds:
  - versionName: 1.3.0
    versionCode: 11
    commit: 00b18051571156c564fae762842913437ddc4dad
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export flutterVersion=$(cat .flutter-version)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform=android-arm

  - versionName: 1.3.0
    versionCode: 12
    commit: 00b18051571156c564fae762842913437ddc4dad
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export flutterVersion=$(cat .flutter-version)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform=android-arm64

  - versionName: 1.3.0
    versionCode: 13
    commit: 00b18051571156c564fae762842913437ddc4dad
    output: build/app/outputs/flutter-apk/app-x86_64-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export flutterVersion=$(cat .flutter-version)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform=android-x64

AutoUpdateMode: Version
UpdateCheckMode: Tags
VercodeOperation:
