RepoType: git
Repo: https://gitlab.com/ari-donnenfeld/pictionary-generator.git

Builds:
  - versionName: 1.1.8
    versionCode: 121
    commit: 2ccb0f9125d34edf2853fb9cf9d633a693f526d6
    output: build/app/outputs/flutter-apk/app-x86_64-release.apk
    binary: 
      https://gitlab.com/api/v4/projects/37895109/packages/generic/release_files/v%v/app-x86_64-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E 's/.*flutter:(.*)/\1/p' .gitlab-ci.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-x64"

