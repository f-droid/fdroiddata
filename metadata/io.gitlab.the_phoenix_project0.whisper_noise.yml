Builds:
  - versionName: 1.0.0
    versionCode: 11
    commit: 9a8d36f6d08fbcde6e18dea9109897c0c3a964bf
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://gitlab.com/the-phoenix-project0/whisper-noise/-/releases/v%v/downloads/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - macos
      - windows
      - linux
      - web
    prebuild:
      - flutterVersion=$(cat .flutter-version)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform android-arm

