AntiFeatures:
  NonFreeNet:
    en-US: ISBN lookup relies on openlibrary.org and publish function relies on GitHub.
Categories:
  - Reading
License: GPL-3.0-or-later
AuthorName: Parallel Line Foundation
SourceCode: https://github.com/PLFIndia/pitak-x
IssueTracker: https://github.com/PLFIndia/pitak-x/issues

AutoName: Pitak

RepoType: git
Repo: https://github.com/PLFIndia/pitak-x.git

Builds:
  - versionName: 1.0.3
    versionCode: 4
    commit: 714af008cb7f009737fd2cea20452ddb460dfe03
    subdir: app
    gradle:
      - yes

  - versionName: 1.1.2
    versionCode: 71
    commit: 1c30ca4e77feb1749dfae1a1a50caafec08e298e
    sudo:
      - apt-get update
      - apt-get install -y clang cmake make ninja-build pkg-config gcc libc-dev rustup
    output: build/app/outputs/flutter-apk/app-x86_64-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - macos
      - windows
      - linux
    prebuild:
      - sed -i -e "s/'stable'/'1.96.0'/" rust_builder/cargokit/build_tool/lib/src/builder.dart
      - export version=$(grep flutter .fvmrc | cut -d ":" -f2 | cut -d "\"" -f2)
      - '[[ $version ]]'
      - git -C $$flutter$$ checkout -f $version
      - rustup default 1.96.0
      - rustup target add x86_64-linux-android
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PATH="$$flutter$$/bin:$PATH"
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutter build apk --release --split-per-abi --target-platform=android-x64
    ndk: r28c

