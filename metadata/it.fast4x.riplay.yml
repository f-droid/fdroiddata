Builds:
  - versionName: 0.7.69
    versionCode: 69
    commit: 0d4ccb640b370dd55d4512b4965a12fb95bc7251
    subdir: composeApp
    sudo:
      - export CPUS_MAX=6
      - export CPUS=$(getconf _NPROCESSORS_ONLN)
      - for (( c=$CPUS_MAX; c<$CPUS; c++ )) ; do echo 0 > /sys/devices/system/cpu/cpu$c/online
        ; done
    gradle:
      - foss
    binary: 
      https://github.com/fast4x/RiPlay/releases/download/v%v/RiPlay-foss-release-%v.apk
    srclibs:
      - reproducible-apk-tools@v0.3.0
    rm:
      - bundletool.jar
    prebuild: sed -i -e '/jetbrains.space/d' -e '/androidx.dev/d' ../settings.gradle.kts
      build.gradle.kts
    postbuild:
      - mv $$OUT$$ unaligned.apk
      - $$reproducible-apk-tools$$/zipalign.py --page-size 16 --replace unaligned.apk
        $$OUT$$

