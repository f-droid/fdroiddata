License: GPL-3.0-only
AuthorName: Geoffrey Bonneville
WebSite: https://www.pikatorrent.com/
SourceCode: https://github.com/G-Ray/pikatorrent
IssueTracker: https://github.com/G-Ray/pikatorrent/issues
Donate: https://github.com/sponsors/G-Ray

AutoName: PikaTorrent

RepoType: git
Repo: https://github.com/G-Ray/pikatorrent.git

Builds:
  - versionName: 0.15.0
    versionCode: 7
    commit: 7570685471c1f584c123eeba553dc38e033beb73
    subdir: app
    submodules: true
    sudo:
      - apt-get update
      - apt-get install -y yq zip make pkg-config ninja-build cmake
    output: build/app/outputs/apk/release/app-release-unsigned.apk
    srclibs:
      - flutter@stable
    rm:
      - app/ios
      - app/linux
      - app/macos
      - app/windows
      - app/vcpkg/scripts/*.exe
    prebuild:
      - flutterVersion=$(yq -r .environment.flutter pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    build:
      - export VCPKG_FEATURE_FLAGS=-binarycaching
      - export VCPKG_ROOT=$(pwd)/vcpkg
      - export VCPKG_MANIFEST_DIR=$(pwd)
      - vcpkg/bootstrap-vcpkg.sh -disableMetrics
      - $$flutter$$/bin/flutter build apk --dart-define-from-file=production.env
    ndk: 27.3.13750724

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: app/pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 0.15.0
CurrentVersionCode: 7
