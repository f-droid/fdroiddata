License: Apache-2.0
AuthorName: msx80
SourceCode: https://github.com/msx80/turnsofwar
IssueTracker: https://github.com/msx80/turnsofwar/issues/
Donate: https://www.paypal.com/paypalme/msx80

AutoName: TurnsOfWar

RepoType: git
Repo: https://github.com/msx80/turnsofwar.git

Builds:
  - versionName: 0.0.1
    versionCode: 1
    commit: 3afcc1c9602e61448834af21850958150f76b8f5
    subdir: Omicron/wrappers/android-wrapper/app
    submodules: true
    sudo:
      - apt-get update
      - apt-get install -y maven
    gradle:
      - yes
    prebuild:
      - sdkmanager "build-tools;33.0.2" "platforms;android-26" "platforms;android-34"
      - echo -e "\ncartridge.version=$$VERSION$$" >> ../gradle.properties
      - cd ../../../..
      - mvn -f turnsofwar/pom.xml install
    scanignore:
      - turnsofwar/src/main/resources/com/github/msx80/turnsofwar/file2.bin
    gradleprops:
      - cartridge.artifactId=turnsofwar
      - cartridge.groupId=com.github.msx80.omicron
      - omicron.version=0.0.12

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: turnsofwar/pom.xml|<version>\d+\.\d+\.(\d+)<\/version>||([\d.]+)
CurrentVersion: 0.0.1
CurrentVersionCode: 1
