AutoName: wormhole

RepoType: git
Repo: https://github.com/wormhole-app/wormhole

Builds:
  - versionName: 1.1.8
    versionCode: 6641
    commit: de71dd9ad80d35ed5d5366faa4e021677eec2b2a
    subdir: android
    sudo:
      - mkdir -p /home/runner/work/wormhole
      - chown -R vagrant /home/runner
      - echo "deb http://deb.debian.org/debian bookworm main" > /etc/apt/sources.list.d/bookworm.list
      - apt-get update
      - apt-get install -y rustup clang
      - apt-get install -y -t bookworm openjdk-17-jdk-headless
      - update-java-alternatives -s java-1.17.0-openjdk-amd64
    output: ../build/app/outputs/flutter-apk/app-x86_64-release.apk
    binary: 
      https://github.com/wormhole-app/wormhole/releases/download/%v/wormhole-android-openSource-x86_64.apk
    srclibs:
      - flutter@stable
    prebuild:
      - cd ..
      - export flutterVersion=$(sed -n -E "s/.*flutter:\s([0-9.]+)/\1/p" pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter packages pub get
    scandelete:
      - .pub-cache
    build:
      - cd ..
      - export CARGO_HOME=/home/runner/.cargo
      - export RUST_VERSION=$(sed -n -E 's/channel = "(.*)"/\1/p' rust/rust-toolchain.toml)
      - export repo=/home/runner/work/wormhole/wormhole
      - cd ..
      - mv eu.heili.wormhole $repo
      - pushd $repo
      - rustup default $RUST_VERSION
      - rustup target add x86_64-linux-android
      - sed -i -e "s/'stable'/'$RUST_VERSION'/" rust_builder/cargokit/build_tool/lib/src/builder.dart
      - bash scripts/prepare-fdroid-build.sh
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter pub get
      - $$flutter$$/bin/flutter gen-l10n
      - sed -i -e 's/-Wl,/-Wl,--build-id=none,/' $PUB_CACHE/hosted/pub.dev/flutter_zxing-*/src/CMakeLists.txt
      - $$flutter$$/bin/flutter build apk --split-per-abi --target-platform="android-x64"
      - popd
      - mv $repo eu.heili.wormhole

