Builds:
  - versionName: 1.2.1
    versionCode: 41
    commit: 8e6ea62c3838b1d224146ee7ff5c7fb7cf086a36
    subdir: android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
    init: npm ci --legacy-peer-deps
    gradle:
      - yes
    output: build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
    prebuild:
      - rm -rf ../../node_modules/expo-dev-client ../../node_modules/expo-dev-launcher
        ../../node_modules/expo-dev-menu ../../node_modules/expo-dev-menu-interface
      - sed -i '/jvmToolchain\|JavaVersion/s/17/21/' ../../node_modules/@react-native/gradle-plugin/*/build.gradle.kts
        ../../node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
        ../../node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
        ../../node_modules/react-native/ReactAndroid/build.gradle.kts
      - sed -i -e '/signingConfig hasReleaseKeystore/d' build.gradle
      - printf '\nkotlin.jvm.target.validation.mode=warning\n' >> ../gradle.properties
    scanignore:
      - node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
      - node_modules/@react-native-masked-view/masked-view/android/build.gradle
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
    scandelete:
      - node_modules

