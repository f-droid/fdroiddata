Builds:
  - versionName: '31.08'
    versionCode: 2298
    commit: f682ee4f4b101bdbe4821484f357cc975d94fc00
    subdir: smarttubetv
    submodules: true
    sudo:
      - echo "deb https://deb.debian.org/debian bullseye main" > /etc/apt/sources.list.d/bullseye.list
      - apt-get update
      - apt-get install -y -t bullseye openjdk-11-jdk-headless
      - update-java-alternatives --set java-1.11.0-openjdk-amd64
    gradle:
      - stfdroid
    output: build/outputs/apk/stfdroid/release/SmartTube_fdroid_$$VERSION$$_universal.apk
    rm:
      - SharedModules/j2v8/src/main/jniLibs
      - MediaServiceCore/SharedModules/j2v8/src/main/jniLibs
      - exoplayer-amzn-2.10.6/extensions/cast
      - exoplayer-amzn-2.10.6/extensions/ima
    prebuild: sed -i -e '/firebase-crashlytics:/,+2d' -e '/firebase/d' build.gradle

