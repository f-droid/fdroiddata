Builds:
  - versionName: 1.3.1
    versionCode: 181
    commit: 394fba23a25d65489dd9998d4821dad734e323cf
    sudo:
      - mkdir -p /home/runner/work/Timety
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/Benji377/Timety/releases/download/v%v/timety-v%v-armeabi-v7a.apk
    srclibs:
      - flutter@stable
    rm:
      - web
    prebuild:
      - export repo=/home/runner/work/Timety/Timety
      - cd ..
      - mv io.github.benji377.timety $repo
      - pushd $repo
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - sed -i -e 's/-Wl,/-Wl,--build-id=none,/' $PUB_CACHE/hosted/pub.dev/jni-*/src/CMakeLists.txt
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
      - popd
      - mv $repo io.github.benji377.timety
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/Timety/Timety
      - cd ..
      - mv io.github.benji377.timety $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
        --split-debug-info=build/symbols
      - popd
      - mv $repo io.github.benji377.timety

