Categories:
  - Multimedia
  - Recorder
License: MIT
AuthorName: Bartłomiej Jakub Kwiatek
WebSite: https://kwiatek.pro
SourceCode: https://github.com/Flower7C3/tune-tangler
IssueTracker: https://github.com/Flower7C3/tune-tangler/issues

RepoType: git
Repo: https://github.com/Flower7C3/tune-tangler.git

Builds:
  - versionName: 1.7.5
    versionCode: 71
    commit: 91daec11bac4161a60981e9d43cd50afcc48caa5
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E 's/^flutter_sdk_version:\s*([0-9.]+)/\1/p' pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter precache --android
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"

  - versionName: 1.7.5
