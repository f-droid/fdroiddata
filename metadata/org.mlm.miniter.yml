  - versionName: 0.6.3
    versionCode: 182
    commit: 90fc7cf4557736f4b506572fe90bc37a4ccd7542
    subdir: androidApp
    sudo:
      - mkdir -p /home/runner
      - chown vagrant /home/runner
      - apt-get update
      - apt-get install -y gcc libc-dev rustup libva-dev libgbm-dev pkg-config libclang-dev
    gradle:
      - yes
    binary: https://github.com/mlm-games/miniter/releases/download/%v/miniter-%v-x86.apk
    prebuild:
      - sed -i -e '/cargoNdkExtraArgs/a\    cargoHome.set("/home/runner/.cargo")'
        ../shared/build.gradle.kts
      - sed -i -e '/foojay/d' ../settings.gradle.kts
    build:
      - export CARGO_HOME=/home/runner/.cargo
      - export RUST_VERSION=$(sed -n -E 's/channel = "(.*)"/\1/p' ../rust-toolchain.toml)
      - rustup default $RUST_VERSION
      - rustup target add i686-linux-android
      - export CARGO_NDK_VERSION=$(sed -E -n 's/.*CARGO_NDK_VERSION.*"(.*)".*/\1/p'
        ../.github/workflows/release-android.yml)
      - cargo install cargo-ndk@$CARGO_NDK_VERSION --locked
    ndk: r28c
    gradleprops:
      - enableApkSplits=true
      - includeUniversalApk=false
      - targetAbi=x86

