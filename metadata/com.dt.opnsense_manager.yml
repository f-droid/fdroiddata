AutoName: OPNsense Manager

RepoType: git
Repo: https://github.com/Etregin/OPNsense_Manager

Builds:
  - versionName: 1.7.2
    versionCode: 141
    commit: 12612ea29e5ae231d4384fa46c2aad0772aae3eb
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-fdroid-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(cat .flutter-version)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - sed -i '/org.gradle.java.home/d' android/gradle.properties
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --flavor fdroid --target-platform
        android-arm

