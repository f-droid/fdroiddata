  NonFreeNet:
    en-US: Series and episode data is sourced from the TVmaze public API.
Categories:
  - Multimedia
License: AGPL-3.0-only
AuthorName: Allibragi
SourceCode: https://codeberg.org/allibragi/whatiwatch
IssueTracker: https://codeberg.org/allibragi/whatiwatch/issues

AutoName: what I watch

RepoType: git
Repo: https://codeberg.org/allibragi/whatiwatch.git

Builds:
  - versionName: 0.1.1
    versionCode: 11
    commit: f77d7c87e08fa06dc79838fb86b0b57bfb45bbbc
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - linux
    prebuild:
      - flutterVersion=$(cat .flutter-version)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scanignore:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

