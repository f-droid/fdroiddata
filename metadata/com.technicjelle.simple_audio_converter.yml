IssueTracker: https://github.com/TechnicJelle/SimpleAudioConverter/issues
Changelog: https://github.com/TechnicJelle/SimpleAudioConverter/releases

AutoName: Simple Audio Converter

RepoType: git
Repo: https://github.com/TechnicJelle/SimpleAudioConverter

Builds:
  - versionName: 1.0.2
    versionCode: 31
    commit: 6011ec1b50f087d55b8470d4b09528e37d653b81
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*FLUTTER_VERSION:\ '(.*)'/\1/p" .github/workflows/build-for-release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"

  - versionName: 1.0.2
