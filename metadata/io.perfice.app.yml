  - versionName: 0.0.18
    versionCode: 18
    commit: d71e9c09b460575377950efc35fb31ea561e0dbf
    subdir: client/android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
      - npm install --global @capacitor/cli
    gradle:
      - yes
    build:
      - cd ../../../android
      - npm install
      - npm run build
      - cd ../client
      - npm install
      - CAPACITOR=true npm run build
      - npx cap sync

