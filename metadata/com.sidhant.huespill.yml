Categories:
  - Puzzle Game
License: GPL-3.0-only
AuthorName: Sidhant
AuthorWebSite: https://sidhant947.github.io
SourceCode: https://github.com/sidhant947/HueSpill
IssueTracker: https://github.com/sidhant947/HueSpill/issues

AutoName: Hue Spill

RepoType: git
Repo: https://github.com/sidhant947/HueSpill.git

Builds:
  - versionName: 1.0.0
    versionCode: 11
    commit: b16c60a5917fa89219e24cb021ece875cda689ba
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - git -C $$flutter$$ checkout -f $(sed -n -E "s/.*revision:\ \"(.*)\"/\1/p"
        .metadata)
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

  - versionName: 1.0.0
    versionCode: 12
    commit: b16c60a5917fa89219e24cb021ece875cda689ba
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
