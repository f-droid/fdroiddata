Builds:
  - versionName: 1.1.7
    versionCode: 252
    commit: ff19650801a1025e3e63a293753e9d7a5f6d86f1
    sudo:
      - apt-get update
      - apt-get install -y --no-install-recommends pkg-config cmake make ninja-build
        g++ libc-dev rustup
    output: app/build/outputs/apk/release/app-arm64-v8a-release.apk
    binary: 
      https://github.com/privkeyio/keep-android/releases/download/v%v/keep-android-v%v-arm64-v8a.apk
    srclibs:
      - keep@ded5f70eac80bff3722598b4a2ebf3f50a2567a7
    prebuild:
      - git -C $$keep$$ checkout -f $(cat keep.version)
      - rustup default 1.89.0
      - rustup target add aarch64-linux-android
      - cargo install --locked --version 4.1.2 cargo-ndk
    build:
      - export KEEP_REPO=$$keep$$
      - export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
      - export PATH=$HOME/.cargo/bin:$JAVA_HOME/bin:$PATH
      - export AWS_LC_SYS_CMAKE_BUILDER=1
      - export SOURCE_DATE_EPOCH="$(./scripts/derive-sde.sh)"
      - export TARGETS=aarch64-linux-android
      - gradle assembleRelease
    ndk: r29

