Builds:
  - versionName: 6.1.6
    versionCode: 43
    commit: 5f415c54db52f6c7e41c47cf913adc973d622ac6
    subdir: app
    sudo:
      - apt-get update
      - apt-get install -y golang-go gcc libc-dev make
    gradle:
      - yes
    output: build/outputs/apk/release/app-universal-release-unsigned.apk
    srclibs:
      - go@go1.23.5
    rm:
      - app/libs
    build:
      - pushd $$go$$/src
      - ./make.bash
      - popd
      - export PATH="$$go$$/bin:$PATH"
      - sdkmanager 'platforms;android-24'
      - export GOPATH="$PWD/.gopath"
      - export PATH="$GOPATH/bin:$PATH"
      - export GOFLAGS="-buildvcs=false"
      - go version
      - go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.12
      - gomobile init
      - mkdir -p libs
      - cd ../tunnel
      - gomobile bind -target=android -androidapi 24 -trimpath -ldflags='-s -w -buildid=
        -extldflags=-Wl,-z,max-page-size=16384' -o ../app/libs/tunnel.aar github.com/nqmgaming/blockads-tunnel
    ndk: r26b

