AntiFeatures:
  NonFreeNet:
    en-US: Optional cloud sync with auth.reloado.com, a proprietary cloud service.
      Uses simpleicons.org and google.com/s2/favicons to display the most up-to-date
      service icons.
Categories:
  - Password & 2FA
License: AGPL-3.0-only
AuthorName: Reloado
SourceCode: https://github.com/refda/reloado_auth
IssueTracker: https://github.com/refda/reloado_auth/issues

AutoName: Reloado Auth

RepoType: git
Repo: https://github.com/refda/reloado_auth

Builds:
  - versionName: 1.0.2
    versionCode: 31
    commit: 4a50dc4333192bf51b73cb11dc90751b07019cbb
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/refda/reloado_auth/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
      - reproducible-apk-tools@v0.3.0
    prebuild:
      - flutterVersion=$(awk -F"'" '/flutter-version/{print $2}' .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - cd ..
      - mv com.reloado.auth /tmp/build
      - pushd /tmp/build
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - sed -i -e '1a add_link_options("LINKER:--build-id=none")' $PUB_CACHE/hosted/pub.dev/flutter_zxing-*/*/CMakeLists.txt
      - popd
      - mv /tmp/build com.reloado.auth
    scandelete:
      - .pub-cache
    build:
      - cd ..
      - mv com.reloado.auth /tmp/build
      - pushd /tmp/build
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm
      - popd
      - mv /tmp/build com.reloado.auth
    ndk: r27
    postbuild:
      - mv $$OUT$$ unaligned.apk
      - $$reproducible-apk-tools$$/zipalign.py --page-size 16 --pad-like-apksigner
        --replace unaligned.apk $$OUT$$

