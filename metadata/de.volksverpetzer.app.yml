AntiFeatures:
  TetheredNet:
    de-DE: App greift auf volksverpetzer-app.de zu (kann nicht konfiguriert werden)
    en-US: App is tethered to volksverpetzer-app.de (cannot be configured)
Categories:
  - Internet
  - News
  - Reading
  - Writing
License: MIT
AuthorName: Volksverpetzer
WebSite: https://volksverpetzer.de/app/
SourceCode: https://github.com/Volksverpetzer/vvp_app
IssueTracker: https://github.com/Volksverpetzer/vvp_app/issues
Changelog: https://github.com/Volksverpetzer/vvp_app/releases
Donate: https://www.volksverpetzer.de/unterstutzen/

AutoName: Volksverpetzer

RepoType: git
Repo: https://github.com/Volksverpetzer/vvp_app.git

Builds:
  - versionName: 2.1.12
    versionCode: 2605212
    disable: wrong commit hash
    commit: 959d8bd7dc208cc3e97105edabdfb971464e69ad
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
      - npm install -g pnpm@11.1.3
    output: android/app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
    prebuild:
      - pnpm install --frozen-lockfile
      - sed -i '/jvmToolchain/s/17/21/' node_modules/@react-native/gradle-plugin/*/build.gradle.kts
      - sed -i -e 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' -e 's/jvmToolchain(17)/jvmToolchain(21)/g'
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
      - pnpm prepare:fdroid
      - BUILD_FOSS_ONLY=true npx expo prebuild --platform android --clean
      - sed -i 's/versionCode [0-9]*/versionCode $$VERCODE$$/' android/app/build.gradle
      - sed -i -e '/signingConfig /d' android/app/build.gradle
      - sed -i -e '/installreferrer/d' node_modules/expo-application/android/build.gradle
      - sed -i -e '/com.android.installreferrer.api/d' -e '/StringBuilder()/,/^      })/d'
        -e '/getInstallReferrerAsync/apromise.resolve("")' 
        node_modules/expo-application/android/src/main/java/expo/modules/application/ApplicationModule.kt
    scanignore:
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
      - node_modules/react-native-webview/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-view-shot/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
    scandelete:
      - node_modules
    build:
      - cd android
      - BUILD_FOSS_ONLY=true gradle assembleRelease
    antifeatures:
      NonFreeNet:
        en-US: Uses a proprietary API server; source code is not available yet.
        de-DE: Proprietärer API-Server; Quelltext noch nicht verfügbar.
      Tracking:
        en-US: Plausible (Analytics) is enabled by default and cannot be disabled.
        de-DE: Plausible (Analytics) ist standardmäßig aktiv und nicht abschaltbar.

