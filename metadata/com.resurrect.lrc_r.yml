AutoName: Lrc-R

RepoType: git
Repo: https://github.com/resurrectdev1/lrc-r

Builds:
  - versionName: 0.2.6
    versionCode: 31
    commit: 392a92e8533b13d90dfbc7fe95beae0cee7c4860
    sudo:
      - mkdir -p /home/resurrectdev
      - chown -R vagrant /home/resurrectdev
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/resurrectdev1/lrc-r/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - reproducible-apk-tools@v0.3.0
      - flutter@stable
    prebuild:
      - flutterVersion=$(cat .flutter-version)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - sed -i -e '/buildTypes {/,/^    }/d' android/app/build.gradle.kts
      - export repo=/home/resurrectdev/lrc_r
      - cd ..
      - mv com.resurrect.lrc_r $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo com.resurrect.lrc_r
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/resurrectdev/lrc_r
      - cd ..
      - mv com.resurrect.lrc_r $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - popd
      - mv $repo com.resurrect.lrc_r
    ndk: r28c
    postbuild:
      - mv $$OUT$$ unaligned.apk
      - $$reproducible-apk-tools$$/zipalign.py --page-size 16 --pad-like-apksigner
        --replace unaligned.apk $$OUT$$

