Builds:
  - versionName: 1.6.1
    versionCode: 33
    commit: d8cf30fa8bce32411fddec30784a9e91c34f8d08
    subdir: apps/mobile/android/app
    sudo:
      - apt-get update
      - apt-get install -y npm
    gradle:
      - foss
    prebuild:
      - cd ../../../..
      - npm ci --workspace=@colota/shared --workspace=@colota/mobile
      - find node_modules/@react-native/gradle-plugin -name 'build.gradle.kts' -exec
        sed -i 's/jvmToolchain(17)/jvmToolchain(21)/' {} +
      - sed -i -e 's/VERSION_17/VERSION_21/g' -e 's/jvmToolchain(17)/jvmToolchain(21)/g'
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
      - npm run build -w @colota/shared
      - sed -i 's/enable !gradle.*/enable false/' apps/mobile/android/app/build.gradle
      - sed -i '/play-services-location/d' node_modules/@maplibre/maplibre-react-native/android/build.gradle
    scanignore:
      - node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
    scandelete:
      - node_modules

