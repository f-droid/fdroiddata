AutoName: Vegan Inspector

RepoType: git
Repo: https://codeberg.org/Vegan-Inspector/app

Builds:
  - versionName: 1.0.1
    versionCode: 21
    disable: notice.z diff
    commit: 87073bd2fa0ad894b10c92fd514402c8ccccaac2
    sudo:
      - mkdir -p /workspace/Vegan-Inspector/app/work/vegan-inspector
      - chown -R vagrant /workspace/Vegan-Inspector/
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://codeberg.org/Vegan-Inspector/app/releases/download/v%v/vegan-inspector-%v-armeabi-v7a.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/^\s+flutter:\s*'?([0-9.]+)'?/\1/p" pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/workspace/Vegan-Inspector/app/work/vegan-inspector/vegan-inspector
      - cd ..
      - mv app.vegan_inspector $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter packages pub get
      - sed -i -e 's/-Wl,/-Wl,--build-id=none,/' $PUB_CACHE/hosted/pub.dev/jni-*/src/CMakeLists.txt
      - popd
      - mv $repo app.vegan_inspector
    scandelete:
      - .pub-cache
    build:
      - export repo=/workspace/Vegan-Inspector/app/work/vegan-inspector/vegan-inspector
      - cd ..
      - mv app.vegan_inspector $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi
      - popd
      - mv $repo app.vegan_inspector
    ndk: r28c

