  - versionName: 2.2.5
    versionCode: 1070303671
    commit: d6f41784c787f15b8d90e2e35deecdbbe469c41a
    sudo:
      - apt-get update
      - apt-get install -y build-essential clang cmake ninja-build pkg-config
      - mkdir -p /woodpecker/src/codeberg.org/OpenVitals
      - chown -R vagrant /woodpecker
    output: build/app/outputs/flutter-apk/app-release.apk
    binary: 
      https://codeberg.org/OpenVitals/mobile-app/releases/download/v%v/OpenVitals-v%v-armeabi-v7a.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
    prebuild:
      - sdkmanager "platforms;android-37.0" "build-tools;37.0.0"
      - export repo=/woodpecker/src/codeberg.org/OpenVitals/mobile-app
      - cd ..
      - mv tech.mmarca.openvitals $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export flutterVersion=$(sed -n 's|.*cirruslabs/flutter:\([0-9][0-9.]*\).*|\1|p'
        .woodpecker/release.yml | head -1)
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics --no-cli-animations
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo tech.mmarca.openvitals
    scandelete:
      - .pub-cache
    build:
      - export repo=/woodpecker/src/codeberg.org/OpenVitals/mobile-app
      - cd ..
      - mv tech.mmarca.openvitals $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export baseCode=$(sed -n 's/^version:[[:space:]]*[0-9.]*+\([0-9][0-9]*\).*/\1/p'
        pubspec.yaml | head -1)
      - $$flutter$$/bin/flutter build apk --release --target-platform android-arm
        --build-number $(($baseCode * 10 + 1))
      - popd
      - mv $repo tech.mmarca.openvitals

