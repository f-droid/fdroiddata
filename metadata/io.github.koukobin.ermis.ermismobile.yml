AuthorName: Ilias Koukovinis
AuthorEmail: ilias.koukovinis@gmail.com
SourceCode: https://github.com/Koukobin/Ermis
IssueTracker: https://github.com/Koukobin/Ermis/issues

AutoName: Ermis

RepoType: git
Repo: https://github.com/Koukobin/Ermis.git
Binaries: 
  https://github.com/Koukobin/Ermis/releases/download/client-mobile-v%v/app-split-arm64-release.apk

Builds:
  - versionName: 1.5.1
    versionCode: 2021
    commit: 864466c1f104ecc1d0f0bb15b996f29f893d890a
    subdir: ErmisClient/Mobile/ermis_client
    sudo:
      - mkdir -p /home/runner/work/Ermis/Ermis/ErmisClient/Mobile
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ErmisClient/Desktop/
      - ErmisServer
      - ErmisClient/Mobile/ermis_client/ios
      - ErmisClient/Mobile/ermis_client/linux
      - ErmisClient/Mobile/ermis_client/macos
      - ErmisClient/Mobile/ermis_client/web
      - ErmisClient/Mobile/ermis_client/windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\s'(.*)'/\1/p" ../../../.github/workflows/build.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/home/runner/work/Ermis/Ermis/ErmisClient/Mobile/ermis_client
      - cd ..
      - mv ermis_client $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - popd
      - mv $repo ermis_client
    scandelete:
      - ErmisClient/Mobile/ermis_client/.pub-cache
      - ErmisClient/Mobile/ermis_client/android/app/.cxx
    build:
      - export repo=/home/runner/work/Ermis/Ermis/ErmisClient/Mobile/ermis_client
      - cd ..
      - mv ermis_client $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/dart run flutter_launcher_icons
      - $$flutter$$/bin/dart run intl_utils:generate
      - $$flutter$$/bin/dart run build_runner build
      - cd assets/chat_backgrounds/doodle_icons
      - $$flutter$$/bin/dart run vector_graphics_compiler --input-dir SVG/ --out-dir
        vg/
      - i=0
      - for f in $(find vg/ -name "*.svg.vec" | sort); do out="vg/$i.vg"; mv "$f"
        "$out"; i=$((i+1)); done
      - cd ../../..
      - $$flutter$$/bin/flutter build apk --split-per-abi --release --target-platform="android-arm64"
      - popd
      - mv $repo ermis_client

