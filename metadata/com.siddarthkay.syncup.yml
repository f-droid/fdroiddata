Builds:
  - versionName: 1.1.12
    versionCode: 29628615
    commit: 02cf729ce53bbc6a945e79b4fd7fe03e9cd50a34
    sudo:
      - apt-get update
      - apt-get install -y make nix-setup-systemd nix
      - chown -R vagrant /nix
    output: mobile-app/android/app/build/outputs/apk/release/app-release.apk
    prebuild:
      - mkdir -p ~/.config/nix
      - echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
      - sdkmanager "platforms;android-23"
      - rm -rf mobile-app/ios
      - make setup
      - make patch-node-modules
    scanignore:
      - mobile-app/node_modules/react-native/sdks/hermesc
    build:
      - export ANDROID_NDK_HOME=$$NDK$$
      - export ANDROID_NDK_ROOT=$$NDK$$
      - export FDROID_VERSION_CODE=$$VERCODE$$
      - make release-android ANDROID_TARGETS=android/arm64 ANDROID_ABI=arm64-v8a
    ndk: r27b

