Builds:
  - versionName: 0.7.4
    versionCode: 2042
    commit: bf3df64da2aa24c8b0ff379614dc991fa42f3f2a
    sudo:
      - apt-get update
      - apt-get install -y golang-go
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    binary: 
      https://github.com/evokelektrique/tunnel-forge/releases/download/v%v/tunnel-forge-v%v-android-arm64-v8a.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform
        android-arm64
    ndk: 28.2.13676358

