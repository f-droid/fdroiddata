Builds:
  - versionName: 1.0.2
    versionCode: 3
    commit: faca50fc05f149920882c0691dc633bc28debc57
    subdir: app
    sudo:
      - mkdir -p /home/runner/work/SponsorCut/SponsorCut
      - chown -R vagrant /home/runner
      - apt-get update
      - apt-get install -y autoconf automake libtool pkg-config nasm cmake gcc gperf
        texinfo yasm bison autogen wget autopoint meson ninja-build ragel groff make
    gradle:
      - yes
    srclibs:
      - InfinityLoop1308-ffmpeg-kit@efd648489598efdc65e2e2f06ae69e065e257077
    build:
      - export ANDROID_NDK_ROOT=$$NDK$$
      - mv $$InfinityLoop1308-ffmpeg-kit$$ /home/runner/work/SponsorCut/SponsorCut/ffmpeg-kit-src
      - pushd /home/runner/work/SponsorCut/SponsorCut/ffmpeg-kit-src
      - ./android.sh --lts --enable-android-media-codec --enable-android-zlib --disable-x86
        --disable-arm-v7a --disable-arm-v7a-neon
      - popd
      - mkdir -p libs
      - find /home/runner/work/SponsorCut/SponsorCut/ffmpeg-kit-src/prebuilt -name
        ffmpeg-kit.aar -exec cp {} libs/ffmpeg-kit.aar \;
    ndk: 25.2.9519653

