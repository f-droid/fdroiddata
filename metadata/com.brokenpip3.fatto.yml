Builds:
  - versionName: 0.6.7
    versionCode: 16
    commit: 96e61da291e1bd5fe418e2f0418aed930efd8516
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y gcc libc6-dev rustup
    gradle:
      - yes
    output: build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk
    build:
      - export CARGO_HOME=$HOME/.cargo
      - rustup toolchain install 1.94.1 --target aarch64-linux-android --target x86_64-linux-android
      - rustup default 1.94.1
      - cargo install --locked cargo-ndk
      - cd ../../rust/taskchampion-android
      - export ANDROID_NDK_HOME=$$NDK$$
      - export RUSTFLAGS="--remap-path-prefix $(pwd)=/c --remap-path-prefix $HOME/.cargo=/cargo
        -C link-arg=-Wl,--build-id=none"
      - cargo ndk -t arm64-v8a -t x86_64 -o ../../android/app/src/main/jniLibs build
        --release
      - cargo build --release
      - cargo run --bin uniffi-bindgen generate --library target/release/libtaskchampion_android.so
        --language kotlin --no-format --out-dir ../../android/app/src/main/uniffi
    ndk: r26b

