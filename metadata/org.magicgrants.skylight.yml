MaintainerNotes: |
  monero_c: vendored jniLibs are removed (rm) and rebuilt from vtnerd/monero_c at the commit pinned in pubspec.lock before flutter build;
  built with -j$(nproc); reproducible.patch forces make's classic pipe jobserver (fixes the make 4.4 --jobserver-auth error).
  tor_ffi_plugin: needs Rust; toolchain 1.83.0 matches upstream Dockerfile.builder.
  Reproducibility: monero_c and the app build at fixed paths (/tmp/monero_c, /tmp/skylight) so build-dir
  paths baked into openssl, Flutter AOT (libapp.so), tor's openssl-sys and zxing match the release build;
  GIT_COMMITTER_DATE is pinned for a deterministic Monero version hash.

