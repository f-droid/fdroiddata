AntiFeatures:
  TetheredNet:
    en-US: Rely on tile.openstreetmap.org for map.
Categories:
  - Location Tracker & Sharer
License: GPL-3.0-or-later
AuthorName: Sunstep
SourceCode: https://github.com/sunstep/dawarich-community
IssueTracker: https://github.com/sunstep/dawarich-community/issues

AutoName: Dawarich (Community)

RepoType: git
Repo: https://github.com/sunstep/dawarich-android.git

Builds:
  - versionName: 0.19.2
    versionCode: 260407000
    commit: ebbd1f614d4d845e74046723a69243f3e9390b70
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-foss-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
    prebuild:
      - cp pubspec-foss.yaml pubspec.yaml
      - cp pubspec-foss.lock pubspec.lock
      - flutterVersion=$(cat .flutter-version)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --flavor foss --split-per-abi
        --target-platform=android-arm --dart-define=cronetHttpNoPlay=true --dart-define=geolocatorNoPlay=true

