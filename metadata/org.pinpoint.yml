Builds:
  - versionName: 1.0.0
    versionCode: 2001
    commit: 35fa9910436eee6da90f157f608308ff69ab551d
    sudo:
      - mkdir -p /home/runner/work/Pinpoint
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - macos
      - windows
      - linux
      - web
    prebuild:
      - export repo=/home/runner/work/Pinpoint
      - cd ..
      - mv org.pinpoint $repo/Pinpoint
      - pushd $repo/Pinpoint
      - sed -i -e 's/^#f//' pubspec.yaml
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PATH=$$flutter$$/bin:$PATH
      - flutter config --no-analytics
      - flutter pub get
      - popd
      - mv $repo/Pinpoint org.pinpoint
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/Pinpoint
      - cd ..
      - mv org.pinpoint $repo/Pinpoint
      - pushd $repo/Pinpoint
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export PATH=$$flutter$$/bin:$PATH
      - flutter build apk --release --split-per-abi --target-platform=android-arm64
      - popd
      - mv $repo/Pinpoint org.pinpoint

