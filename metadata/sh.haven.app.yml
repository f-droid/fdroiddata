      - apt-get update
      - apt-get install -y -t trixie make binutils gawk libc-dev rustup golang-go
        nasm yasm cmake xz-utils bzip2 perl pkg-config autoconf automake libtool libtool-bin
        libltdl-dev meson ninja-build libexpat1-dev libffi-dev python3 bison g++ xutils-dev
