AutoName: Impostor MX

RepoType: git
Repo: https://github.com/retired64/ImpostorMX.git

Builds:
  - versionName: 2.1.0
    versionCode: 31
    commit: cf47d0f50d4c2ffb8fb4c41e09e95a3f323b8522
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/buildAndroid.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - export ANDROID_NDK_HOME=$$SDK$$/ndk/27.0.12077973
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"

