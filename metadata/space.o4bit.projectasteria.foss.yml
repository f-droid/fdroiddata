AntiFeatures:
  NonFreeNet:
    en-US: Relies on the "Where The ISS At?" API (api.wheretheiss.at) for real-time
      ISS location tracking and The Space Devs API (thespacedevs.com) for space launch
      data and imagery. Both are free to use but their server-side code is not open
      source.
  TetheredNet:
    en-US: Relies on the NASA APOD API (apod.nasa.gov) for daily space pictures and
      a self-hosted proxy (asteria.o4bit.space) to serve the data. The proxy source
      code is open source (MIT) but the app depends on that specific server instance.
