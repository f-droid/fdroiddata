      - mcopy -i src/main/assets/ventoy/ventoy.disk.img ::/EFI/BOOT/fbx64.efi $$Ventoy$$/INSTALL/EFI/BOOT/fbx64.efi
      - mcopy -i src/main/assets/ventoy/ventoy.disk.img ::/EFI/BOOT/grubx64_real.efi
