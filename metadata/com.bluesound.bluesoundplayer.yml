AutoName: BlueSound Controller

RepoType: git
Repo: https://github.com/rdOxalis/bluesoundplayer

Builds:
  - versionName: 1.0.0
    versionCode: 11
    commit: f1ab09d7a2136e6a2083b9609e0faaed27e5f60d
    subdir: flutter
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - src
      - release
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" ../.github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - flutter/.pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --split-per-abi --release --target-platform="android-arm"

