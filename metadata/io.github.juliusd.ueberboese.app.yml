Builds:
  - versionName: 0.25.0
    versionCode: 27
    commit: ad426d949516b666f0b9b73808316985a17ecf22
    sudo:
      - mkdir -p /home/runner/work/ueberboese-app
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    rm:
      - macos
      - linux
      - web
    prebuild:
      - flutterVersion=$(sed -n -E "s/^[[:space:]]+flutter:[[:space:]]*([0-9.]+)/\1/p"
        pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/home/runner/work/ueberboese-app/ueberboese-app
      - cd ..
      - mv io.github.juliusd.ueberboese.app $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - $$flutter$$/bin/dart run build_runner build --delete-conflicting-outputs
      - popd
      - mv $repo io.github.juliusd.ueberboese.app
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/ueberboese-app/ueberboese-app
      - cd ..
      - mv io.github.juliusd.ueberboese.app $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release
      - popd
      - mv $repo io.github.juliusd.ueberboese.app

