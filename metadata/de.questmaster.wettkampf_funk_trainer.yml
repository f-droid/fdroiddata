  - versionName: '2.5'
    versionCode: 45
    commit: ec2730b473bab05bbbac2b8ce4a2b302bf219ac4
    subdir: app
    sudo:
      - apt-get update
      - apt-get install -y rustup build-essential
      - ln -sf "/home/vagrant/.cargo/bin/cargo" /usr/local/bin/cargo
      - ln -sf "/home/vagrant/.cargo/bin/rustc" /usr/local/bin/rustc
      - ln -sf "/home/vagrant/.cargo/bin/rustup" /usr/local/bin/rustup
      - ln -sf "/home/vagrant/.cargo/bin/cargo-ndk" /usr/local/bin/cargo-ndk
    gradle:
      - yes
    prebuild:
      - export CARGO_HOME="$HOME/.cargo"
      - rustup default stable
      - rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android
        x86_64-linux-android
      - cargo install cargo-ndk --version "^3" --locked
    ndk: 26.1.10909125

  - versionName: 2.5.1
    versionCode: 46
    commit: 4c925a9a49863d8daac297413c127afc65789b2a
    subdir: app
    sudo:
      - apt-get update
      - apt-get install -y rustup gcc libc-dev
    gradle:
      - yes
    prebuild:
      - rustup default 1.94.1
      - rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android
        x86_64-linux-android
      - cargo install cargo-ndk@4.1.2 --locked
    ndk: r26b

  - versionName: 3.0.0
    versionCode: 501
    commit: eaafd374b3e14af5a9fc99045ba54d23588ef3d6
    subdir: flutter
    sudo:
      - apt-get update
      - apt-get install -y rustup gcc libc-dev
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - flutter/ios
      - flutter/windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/^ENV FLUTTER_VERSION=(.*)/\1/p" ../Dockerfile.mobile)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$$flutter$$/pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - rustup default 1.94.1
      - rustup target add armv7-linux-androideabi
      - cargo install cargo-ndk@4.1.2 --locked
    build:
      - export PUB_CACHE=$$flutter$$/pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform
        android-arm
    ndk: r28c

