AntiFeatures:
  NonFreeNet:
    en-US: The optional AI coach sends your prompts to the Groq API using an API key
      you provide yourself. It is disabled by default and every other feature works
      fully offline.
Categories:
  - Sports & Health
License: Apache-2.0
AuthorName: FitForge Contributors
SourceCode: https://github.com/mnkkhan77/fitforge
IssueTracker: https://github.com/mnkkhan77/fitforge/issues
Changelog: https://github.com/mnkkhan77/fitforge/blob/main/CHANGELOG.md

AutoName: fitforge

RepoType: git
Repo: https://github.com/mnkkhan77/fitforge

Builds:
  - versionName: 2.0.0
    versionCode: 11
    commit: 8fb966804a22e7fdf34943b272809c4c3d7babde
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - flutterVersion=$(cat .flutter-version | tr -d '[:space:]')
      - git -C $$flutter$$ checkout -f $flutterVersion
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"

