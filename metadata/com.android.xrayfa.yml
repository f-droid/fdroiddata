Categories:
  - VPN & Proxy
License: Apache-2.0
AuthorName: Q7DF1
AuthorEmail: xiaom9853@gmail.com
SourceCode: https://github.com/Q7DF1/XrayFA
IssueTracker: https://github.com/Q7DF1/XrayFA/issues

AutoName: XrayFA

RepoType: git
Repo: https://github.com/Q7DF1/XrayFA

Builds:
  - versionName: 1.5.5
    versionCode: 24001
    commit: 2ed69502c25b0abcec345cee02224c433efb10c0
    subdir: app
    submodules: true
    sudo:
      - apt-get update
      - apt-get install -y golang-go gcc libc-dev make
    gradle:
      - yes
    output: build/outputs/apk/release/XrayFA-armeabi-v7a-release-unsigned.apk
    binary: 
      https://github.com/Q7DF1/XrayFA/releases/download/v%v/XrayFA-armeabi-v7a-release.apk
    srclibs:
      - go@go1.26.2
    prebuild:
      - sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - GO_VER=$(grep "^GO_VERSION=" ../gradle.properties | cut -d'=' -f2 | tr -d
        '\r')
      - GEO_IP_VERSION=$(grep "^GEO_IP_VERSION=" ../gradle.properties | cut -d'='
        -f2 | tr -d '\r')
      - GEO_SITE_VERSION=$(grep "^GEO_SITE_VERSION=" ../gradle.properties | cut -d'='
        -f2 | tr -d '\r')
      - LIB_ASSETS_DIR="../AndroidLibXrayLite/assets"
      - curl -Lo $LIB_ASSETS_DIR/geoip.dat 
        "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/${GEO_IP_VERSION}/geoip.dat"
      - curl -Lo $LIB_ASSETS_DIR/geosite.dat 
        "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/${GEO_SITE_VERSION}/geosite.dat"
      - git -C $$go$$ checkout -f "go${GO_VER}"
      - sed -i -e '/bootgo/s/1.24.6/1.24.4/' $$go$$/src/make.*
      - sed -i -e '/minBootstrap/s/1.24.6/1.24.4/' $$go$$/src/cmd/dist/buildtool.go
      - sed -i -e 's/include("armeabi-v7a".*/include("armeabi-v7a")/' -e '/isUniversalApk/s/true/false/'
        build.gradle.kts
    build:
      - pushd $$go$$/src
      - ./make.bash
      - popd
      - export GOROOT=$$go$$
      - export GOPATH="$HOME/go"
      - export PATH="$GOROOT/bin:$PATH"
      - export PATH="$GOPATH/bin:$PATH"
      - export GOFLAGS="-modcacherw -buildvcs=false -trimpath"
      - export CGO_LDFLAGS="-Wl,--build-id=none"
      - go install golang.org/x/mobile/cmd/gomobile@latest
      - cd ../AndroidLibXrayLite
      - gomobile init
      - go mod tidy -v
      - CURRENT_PATH=$(pwd)
      - export CGO_CFLAGS="-ffile-prefix-map=$CURRENT_PATH=."
      - export CGO_CXXFLAGS="-ffile-prefix-map=$CURRENT_PATH=."
      - gomobile bind -v -trimpath -androidapi 21 -target=android/arm -ldflags="-s
        -w -buildid=" ./
      - mkdir -p ../app/libs
      - cp libv2ray.aar ../app/libs/
    ndk: 27.0.12077973

