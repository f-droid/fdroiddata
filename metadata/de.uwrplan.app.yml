AntiFeatures:
  NonFreeNet:
    en-US: Relies on the proprietary UWR Planner network service, which is required
      for the app to function.
    de-DE: Benötigt den proprietären Netzwerkdienst des UWR Planers, der für die Funktion
      der App erforderlich ist.
Categories:
  - Sports & Health
License: GPL-3.0-or-later
AuthorName: UWR Planer
WebSite: https://uwr-plan.de
SourceCode: https://git.pabr.de/uwr/uwr_plan_app
IssueTracker: https://git.pabr.de/uwr/uwr_plan_app/-/issues

AutoName: UWR Planer

RepoType: git
Repo: https://git.pabr.de/uwr/uwr_plan_app.git

Builds:
  - versionName: 1.3.0
    versionCode: 103001
    commit: 07953fc33ac56faa065cc3d7851c22b186ffc111
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-foss-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E 's|.*image:\s*ghcr\.io/cirruslabs/flutter:(\S+).*|\1|p'
        .gitlab-ci.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --flavor foss --release --split-per-abi
        --target-platform="android-arm"

