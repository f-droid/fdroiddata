Builds:
  - versionName: '0.11'
    versionCode: 11
    commit: 049c3b80362aff064ca6f5b5b3b722e7eea8b19b
    sudo:
      - export CPUS_MAX=16
      - export CPUS=$(getconf _NPROCESSORS_ONLN)
      - for (( c=$CPUS_MAX; c<$CPUS; c++ )) ; do echo 0 > /sys/devices/system/cpu/cpu$c/online
        ; done
    gradle:
      - aosp
      - withoutQuickstep

