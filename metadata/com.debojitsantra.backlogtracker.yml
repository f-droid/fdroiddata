Builds:
  - versionName: 1.0.3
    versionCode: 1
    commit: 6fa93731b0cbeb2a3b995908b85329d6f5c677dd
    subdir: android/app
    sudo:
      - apt-get update
      - echo "deb http://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky nodejs npm
    init:
      - cd ../..
      - npm ci
      - npm run build
      - npx capacitor-assets generate --android
      - npx cap sync android
    gradle:
      - yes
    scandelete:
      - node_modules

