Builds:
  - versionName: 1.3.0
    versionCode: 5
    commit: 9e0a857884929b7a4cfc19ce647c36965fb24ac4
    subdir: composeApp
    sudo:
      - echo "deb https://deb.debian.org/debian trixie main" > /etc/apt/sources.list.d/trixie.list
      - apt-get update
      - apt-get install -y -t trixie openjdk-21-jdk-headless
      - update-alternatives --auto java
    gradle:
      - yes
    srclibs:
      - reproducible-apk-tools@v0.3.0
    prebuild: sed -i -e '/foojay/d' ../settings.gradle.kts
    postbuild: $$reproducible-apk-tools$$/inplace-fix.py --page-size 16 fix-newlines
      $$OUT$$ 
      'assets/composeResources/githubstore.composeapp.generated.resources/drawable/compose-multiplatform.xml'
      'assets/composeResources/githubstore.composeapp.generated.resources/drawable/ic_github.xml'

