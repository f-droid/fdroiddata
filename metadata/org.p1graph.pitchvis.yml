Builds:
  - versionName: '1.28'
    versionCode: 28
    commit: b228027756cdfc81af395e00140ae8c0aa4ee94b
    subdir: pitchvis_viewer/android/app
    sudo:
      - apt-get update
      - apt-get install -y gcc libc-dev rustup
    gradle:
      - yes
    prebuild:
      - rustup default 1.94.0
      - rustup target add aarch64-linux-android
    scandelete:
      - pitchvis_android_serial
      - dagc_fork/examples/dagc-wasm/pkg/dagc_wasm_bg.wasm
    build:
      - export PATH="$HOME/.cargo/bin:$PATH"
      - cargo install cargo-ndk --version 4.1.2 --locked
      - export ANDROID_NDK=$$NDK$$
      - cd ../../..
      - export CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS="-Clink-arg=-lc++_shared
        --remap-path-prefix=$(pwd)=/build --remap-path-prefix=${CARGO_HOME:-$HOME/.cargo}=/cargo"
      - cd pitchvis_viewer && ANDROID_NDK_ROOT="$ANDROID_NDK" cargo ndk -t arm64-v8a
        -o android/app/src/main/jniLibs/ rustc --release --lib --crate-type cdylib
      - cp 
        "$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so"
        android/app/src/main/jniLibs/arm64-v8a/
      - mkdir -p android/app/src/main/assets/shaders
      - cp assets/shaders/* android/app/src/main/assets/shaders/
    ndk: r28c

