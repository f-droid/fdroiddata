MaintainerNotes: |-
  Flutter app. Built with the F-Droid flutter srclib on the stable channel,
  checked out to the exact version pinned in the repo's .flutter-version file
  (extracted in prebuild).

  ABI split: the app ships one APK per ABI (flutter build apk --split-per-abi).
  android/app/build.gradle assigns each split a distinct versionCode using the
  stock Flutter scheme base * 1000 + abiCode, which keeps the ABI in the
  low-order digits (armeabi-v7a -> x001, arm64-v8a -> x002, x86_64 -> x003) and
  matches the VercodeOperation below. The base versionCode comes from
  pubspec.yaml's +N build number (11 for 1.3.1), so the embedded codes are
  11001/11002/11003.

  The app's self-update machinery is disabled by default in upstream source
  (see lib/util/build_flags.dart) and enabled only for GitHub release artifacts
  via --dart-define=GITHUB_RELEASE_BUILD=true. The F-Droid build passes
  --dart-define=FDROID_BUILD=true and does not pass the GitHub release flag, so
  there is no GitHub release polling, no in-app APK download/install path, and
  no "Check for updates" UI. The build also exports FDROID_BUILD=true as an
  environment variable, which makes android/app/build.gradle swap in
  android/app/src/fdroid/AndroidManifest.xml: a manifest without
  REQUEST_INSTALL_PACKAGES, without the package-installer query intent, and
  without the updater-only media/storage permissions (READ_MEDIA_* and
  READ_EXTERNAL_STORAGE, which the open_filex plugin merges in transitively but
  the app never uses). The result declares only INTERNET.

  NonFreeNet is declared because the app can still connect to GitHub raw for
  catalog/freshness refreshes, to third-party project sites for images and
  user-opened project links, and to OpenDesktop to browse community ROM uploads
  and show community discussions. The bundled catalog remains usable offline.

  Signing: android/app/build.gradle falls back to debug signing when
  android/key.properties is absent (it is not committed), so the build
  produces an APK that F-Droid signs with its own key.

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9.]+$
VercodeOperation:
  - 1000 * %c + 1
  - 1000 * %c + 2
  - 1000 * %c + 3
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
