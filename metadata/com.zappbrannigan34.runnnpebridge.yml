AutoName: ruNNNpe bridge
Summary: Bridge NPE RUNN telemetry to Health Connect
Description: |-
  ruNNNpe bridge connects to NPE RUNN and BLE heart-rate sensors,
  keeps a foreground workout session running in background,
  and writes workout data to Health Connect.

  Main features:
  * BLE treadmill and heart-rate sensor integration
  * foreground-service workout tracking for background reliability
  * Health Connect writes for session, speed, distance, heart rate, calories, and elevation
  * live workout telemetry in app and notification

  <b>AntiFeatures:</b>
  * NonFreeDep - Full data synchronization requires Google Health Connect.

