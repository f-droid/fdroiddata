AntiFeatures:
  NonFreeNet:
    en-US: Rely on pokedex-mouzinho.leapcell.app and GitHub.
Categories:
  - Games
License: MIT
AuthorName: Luiz Erivan Filho
AuthorEmail: luiz.mouzinho@proton.me
SourceCode: https://github.com/luizfilho00/pokedex
IssueTracker: https://github.com/luizfilho00/pokedex/issues

AutoName: Pokébase

RepoType: git
Repo: https://github.com/luizfilho00/pokedex

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: 5e890936faf37532f7f29e1589b0430c8499a0b2
    sudo:
      - echo "deb https://deb.debian.org/debian bookworm main" > /etc/apt/sources.list.d/bookworm.list
      - apt-get update
      - apt-get install -y nodejs npm
      - apt-get install -y -t bookworm openjdk-17-jdk-headless
      - update-java-alternatives -a
    output: android/app/build/outputs/apk/release/app-release-unsigned.apk
    prebuild:
      - npm install
      - sed -i -e '1a "expo":{"autolinking":{"android":{"buildFromSource":[".*"]}}},'
        package.json
      - npx expo prebuild --platform android --no-install
      - rm -fr ios
      - sed -i -e '/signingConfig /d' android/app/build.gradle
    scanignore:
      - node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
      - node_modules/expo-modules-autolinking/scripts/android/autolinking_implementation.gradle
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
    scandelete:
      - node_modules
    build:
      - cd android
      - gradle assembleRelease

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: app.json|"versionCode":\s(\d+)|.|"version":\s"([\d.]+)"
CurrentVersion: 1.0.0
CurrentVersionCode: 1
