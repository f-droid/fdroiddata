Builds:
  - versionName: '2.24'
    versionCode: 35
    commit: d61ca21a7725eb05ae6577cecc47ee7b15c70a3e
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y npm
    gradle:
      - yes
    prebuild:
      - cd ../..
      - npm ci
      - find node_modules/ -iname "*.node" -exec rm {} \;
    scanignore:
      - node_modules/@capacitor/cli/assets/capacitor-cordova-android-plugins.tar.gz
    scandelete:
      - node_modules/
    build:
      - pushd ../..
      - npm run sync:www
      - npx cap sync android
      - popd

