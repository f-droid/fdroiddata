Builds:
  - versionName: 0.1.6-alpha
    versionCode: 362
    commit: v0.1.6-alpha
    subdir: android-client/android
    submodules: true
    sudo:
      - apt-get update
      - apt-get install -y golang-go gcc libc-dev make zip
    gradle:
      - yes
    prebuild:
      - echo -e "\norg.gradle.jvmargs=-Xmx4096m" >> gradle.properties
      - sdkmanager 'platforms;android-34' 'platform-tools' 'build-tools;36.0.0'
      - sed -i -e 's|$(ANDROID_HOME)/cmdline-tools/latest/bin/sdkmanager|sdkmanager|g'
        -e 's/list_installed/list/' ../Makefile
      - sed -i -e 's/getVersionProperty("VERSION_LONG")/"$$VERSION$$"/' build.gradle
    scandelete:
      - tailscale
    build:
      - export ANDROID_NDK_ROOT=$$NDK$$
      - make -C .. env
      - make -C .. libtailscale
    ndk: r23c

