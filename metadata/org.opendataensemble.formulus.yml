Builds:
  - versionName: 1.0.1
    versionCode: 2
    commit: e2457de160e8598616f7695316d2f2a3ecbc3829
    subdir: formulus/android/app
    sudo:
      - apt-get update
      - apt-get install -y npm
    init:
      - cd ../..
      - npm cache clean --force
      - npm install --build-from-source
      - npm run vendor:notifee
      - npm run patch:android-foss
      - npm run generate
    gradle:
      - yes
    prebuild:
      - sed -i -e '/applicationVariants.all/,/^    }/d' build.gradle
      - sed -i 's/versionCode = .*/versionCode = $$VERCODE$$/' build.gradle
      - cd ../..
      - sed -i '/jvmToolchain\|JavaVersion/s/17/21/' node_modules/@react-native/gradle-plugin/*/build.gradle.kts
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
      - sed -i -e '/installReferrerVersion/,+12d' node_modules/react-native-device-info/android/build.gradle
    scanignore:
      - formulus/node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
      - formulus/node_modules/@notifee/react-native/android/build.gradle
      - formulus/node_modules/@react-native-community/geolocation/android/build.gradle
      - formulus/node_modules/react-native-screens/android/build.gradle
      - formulus/node_modules/react-native-webview/android/build.gradle
      - formulus/node_modules/react-native-safe-area-context/android/build.gradle
      - formulus/node_modules/react-native-permissions/android/build.gradle
      - formulus/node_modules/@react-native-community/blur/android/build.gradle
      - formulus/node_modules/react-native/ReactAndroid/publish.gradle
      - formulus/node_modules/react-native-device-info/android/build.gradle
      - formulus/node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - formulus/node_modules/react-native-svg/android/build.gradle
      - formulus/node_modules/react-native-image-picker/android/build.gradle
    scandelete:
      - formulus/node_modules
    gradleprops:
      - abiFilters=armeabi-v7a

