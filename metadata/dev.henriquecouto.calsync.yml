Categories:
  - Calendar & Agenda
License: GPL-3.0-only
AuthorName: Henrique Couto
AuthorEmail: email+fdroid@henriquecouto.dev
SourceCode: https://github.com/henriquecouto/calendar-sync
IssueTracker: https://github.com/henriquecouto/calendar-sync/issues

AutoName: CalSync

RepoType: git
Repo: https://github.com/henriquecouto/calendar-sync.git

Builds:
  - versionName: 1.1.0
    versionCode: 71
    commit: 9e5ffb999d396e6aad3f3246459dc4f4db35ea5d
    sudo:
      - mkdir -p /home/runner/work/calendar-sync
      - chown -R vagrant /home/runner/work/calendar-sync
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/henriquecouto/calendar-sync/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export repo=/home/runner/work/calendar-sync/calendar-sync
      - cd ..
      - mv dev.henriquecouto.calsync $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo dev.henriquecouto.calsync
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/calendar-sync/calendar-sync
      - cd ..
      - mv dev.henriquecouto.calsync $repo
      - pushd $repo
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - popd
      - mv $repo dev.henriquecouto.calsync

