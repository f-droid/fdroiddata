Builds:
  - versionName: 12.7.3.0
    versionCode: 675007
    commit: 2ae4bb8b3a40d6473cdbc9e2a8b2d3118cc9c1e4
    timeout: 18000
    subdir: TMessagesProj_App
    submodules: true
    sudo:
      - apt-get update
      - apt-get install -y ninja-build golang-go yasm cmake libuv1 make meson gperf
        ninja-build g++
    gradle:
      - afatFd_v7a
    rm:
      - TMessagesProj_AppHuawei
    prebuild:
      - sed -i -e '/JavaVersion/s/17/21/' {../TMessagesProj,.}/build.gradle
      - sed -i -e '/play/d' ../TMessagesProj/build.gradle
      - sed -i -e '/gms/d' ../TMessagesProj/src/main/java/org/telegram/messenger/CaptchaController.java
      - ../prebuild_fdroid.sh 0 14577864 54d3ae230fd8f985ce9adccf08fbd9d6
      - sed -i -e 's/ANDROID_API=16/ANDROID_API=21/g' ../TMessagesProj/jni/build_dav1d_clang.sh
        ../TMessagesProj/jni/build_ffmpeg_clang.sh
      - sed -i -e 's/API=16/API=21/g' ../TMessagesProj/jni/build_boringssl.sh
      - sed -i -e 's|${TOOLS_PREFIX}ld|${LLVM_BIN}/ld.lld|g' -e 's|${TOOLS_PREFIX}ar|${LLVM_BIN}/llvm-ar|g'
        -e 's|${TOOLS_PREFIX}strip|${LLVM_BIN}/llvm-strip|g' -e 's|${TOOLS_PREFIX}nm|${LLVM_BIN}/llvm-nm|g'
        -e 's|${TOOLS_PREFIX}ranlib|${LLVM_BIN}/llvm-ranlib|g' ../TMessagesProj/jni/build_dav1d_clang.sh
        ../TMessagesProj/jni/build_libvpx_clang.sh ../TMessagesProj/jni/build_ffmpeg_clang.sh
      - sed -i -e 
        's|CROSS_PREFIX=${PREBUILT}/bin/${ARCH_NAME}-linux-${BIN_MIDDLE}-|CROSS_PREFIX=${LLVM_BIN}/llvm-|'
        ../TMessagesProj/jni/build_dav1d_clang.sh ../TMessagesProj/jni/build_libvpx_clang.sh
        ../TMessagesProj/jni/build_ffmpeg_clang.sh
      - sed -i -e '/export ISYSTEM=/d' -e '/--libc=/d' -e 's/-std=c++11/-std=c++17/g'
        ../TMessagesProj/jni/build_libvpx_clang.sh
      - sed -i -e 's|git checkout -- tde2e/|& \&\& sed -i -e "s/23.2.8568313/27.2.12479018/g"
        -e "s/android-16/android-21/g" tde2e/build-tdlib.sh|' ../TMessagesProj/jni/prepare.py
    scanignore:
      - TMessagesProj/src/main/assets/emoji/metadata.bin
    scandelete:
      - TMessagesProj/jni

