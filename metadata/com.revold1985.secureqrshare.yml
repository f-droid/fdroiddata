AuthorName: Jonathan Drolet
SourceCode: https://github.com/Revold1985/secureqrshare
IssueTracker: https://github.com/Revold1985/secureqrshare/issues
Donate: https://ko-fi.com/revold1985

AutoName: Secure QR Share

RepoType: git
Repo: https://github.com/Revold1985/secureqrshare

Builds:
  - versionName: 1.0.0
    versionCode: 41
    commit: 82a2531b78f362f4c132351cbdcad8bfcd16d73e
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

  - versionName: 1.0.0
