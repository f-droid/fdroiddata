Builds:
  - versionName: 0.3.6
    versionCode: 31
    commit: 0.3.6
    srclibs:
      - ActionBarSherlock@4.2.0
      - ViewPagerIndicator@2.4.1

  - versionName: 0.3.7
    versionCode: 32
    commit: 0.3.7.1
    srclibs:
      - ActionBarSherlock@4.2.0
      - ViewPagerIndicator@2.4.1
    target: android-19

  - versionName: '0.4'
    versionCode: 36
    commit: '0.4'
    gradle:
      - yes
    srclibs:
      - ActionBarSherlock@4.4.0
      - ViewPagerIndicator@2.4.1
    rm:
      - libs/*
    prebuild:
      - sed -i -e '/populov/d' -e '/mavenCentral/amavenLocal()' build.gradle
      - "sed -i \"s;compile 'com.viewpagerindicator:library:2.4.1@aar';compile fileTree(dir:
        'libs', include: ['*.jar']);\" build.gradle"
      - pushd $$ViewPagerIndicator$$
      - sed -i 
        's;<android-maven.version>3.3.0</android-maven.version>;<android-maven.version>3.6.1</android-maven.version>;'
        ../pom.xml
      - mvn package
      - popd
      - cp $$ViewPagerIndicator$$/target/library-2.4.1.jar libs/
      - pushd $$ActionBarSherlock$$
      - mvn install
      - popd

