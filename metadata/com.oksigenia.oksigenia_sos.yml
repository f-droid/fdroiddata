Builds:
  - versionName: 4.2.5
    versionCode: 420051
    commit: dadf864fe0b00e0e4b0113fe2f20ae865148fd95
    sudo:
      - mkdir -p /home/runner/work/oksigenia-sos
      - chown -R vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/OksigeniaSL/oksigenia-sos/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
      - test
    prebuild:
      - export version="$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/build_release.yml)"
      - '[[ $version ]]'
      - git -C $$flutter$$ checkout -f $version
      - export repo=/home/runner/work/oksigenia-sos
      - cd ..
      - mv com.oksigenia.oksigenia_sos $repo/oksigenia-sos
      - pushd $repo/oksigenia-sos
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv $repo/oksigenia-sos com.oksigenia.oksigenia_sos
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/oksigenia-sos
      - cd ..
      - mv com.oksigenia.oksigenia_sos $repo/oksigenia-sos
      - pushd $repo/oksigenia-sos
      - export PUB_CACHE=$(pwd)/.pub-cache
      - sed -i -e 's/-Wl,/-Wl,--build-id=none,/' $PUB_CACHE/hosted/*/jni-*/src/CMakeLists.txt
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm"
      - popd
      - mv $repo/oksigenia-sos com.oksigenia.oksigenia_sos
    ndk: 28.2.13676358

