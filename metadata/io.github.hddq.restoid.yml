Categories:
  - System
License: GPL-3.0-only
AuthorName: hddq
SourceCode: https://github.com/hddq/restoid
IssueTracker: https://github.com/hddq/restoid/issues
Translation: https://hosted.weblate.org/projects/restoid

AutoName: Restoid

RequiresRoot: true

RepoType: git
Repo: https://github.com/hddq/restoid

Builds:
  - versionName: 0.4.0
    versionCode: 101
    commit: d3e5740350207194a4b3fd8109ce8485db5d1f76
    subdir: app
    submodules: true
    sudo:
      - echo "deb http://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky golang-go
      - apt-get install -y gcc libc-dev
    gradle:
      - bundled
    output: build/outputs/apk/bundled/release/app-bundled-arm64-v8a-release-unsigned.apk
    binary: 
      https://github.com/hddq/restoid/releases/download/v%v/app-bundled-arm64-v8a-release.apk
    srclibs:
      - go@go1.26.2
    prebuild:
      - GO_VER=$(cat ../.go-version | tr -d '\r\n')
      - git -C $$go$$ checkout -f "go${GO_VER#go}"
    scanignore:
      - restic/internal/repository/testdata/test-repo.tar.gz
      - restic/internal/backend/testdata/repo-layout-default.tar.gz
      - restic/internal/checker/testdata/duplicate-packs-in-index-test-repo.tar.gz
      - restic/internal/checker/testdata/checker-test-repo.tar.gz
      - restic/cmd/restic/testdata
    build:
      - pushd $$go$$/src
      - GOROOT_BOOTSTRAP=/usr/lib/go ./make.bash
      - popd
      - ../scripts/build_restic.sh $$go$$/bin/go

