License: GPL-3.0-only
AuthorName: Sidhant
AuthorWebSite: https://sidhant947.github.io
SourceCode: https://github.com/sidhant947/puzzle
IssueTracker: https://github.com/sidhant947/puzzle/issues

AutoName: Puzzle

RepoType: git
Repo: https://github.com/sidhant947/puzzle.git

Builds:
  - versionName: 1.0.3
    versionCode: 41
    commit: 2ead23a98b3ae12a2b7151d95122e2f500bbca83
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - git -C $$flutter$$ checkout -f $(sed -n -E "s/.*revision:\ \"(.*)\"/\1/p"
        .metadata)
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

  - versionName: 1.0.3
    versionCode: 42
    commit: 2ead23a98b3ae12a2b7151d95122e2f500bbca83
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
