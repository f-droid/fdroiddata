AntiFeatures:
  NonFreeNet:
    en-US: Fauxx intentionally generates synthetic browsing activity against third-party
      network services that are not themselves free/libre:\ Google Search, Bing, Yahoo
      Search, and the user's opted-in ad-preference pages (Google Ads Settings, Facebook
      Ad Preferences) when Layer 2 targeting is enabled. This traffic is the core
      feature — the app's purpose is to generate noise visible to these non-free services.
      No user credentials are sent except by the user's own opt-in interaction with
      the ad-preference scrapers.
