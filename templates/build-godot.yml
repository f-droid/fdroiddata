# PLEASE REMOVE ALL COMMENTS BEFORE SUBMITTING TO F-DROID DATA!

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    sudo:
      - apt-get update
	  # For llvm build use clang instead
      - apt-get install -y pkgconf scons g++
    output: output.apk
    srclibs:
	  # Set the Godot version here
      - Godot@4.6-stable
    build:
	  # Build Godot
      - pushd $$Godot$$
      - export ANDROID_NDK_ROOT=$$NDK$$
      - export ANDROID_HOME=$$SDK$$
      - export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
      - scons -j `nproc` platform=linuxbsd target=editor
      - scons -j `nproc` platform=android target=template_release arch=arm64 generate_apk=yes
      - popd
	  # Move the template apk. This path is set by custom_template/release in export_presets.cfg
      - mv $$Godot$$/bin/android_release.apk android-release.apk
	  # Use your preset name here.
      - $$Godot$$/bin/godot.linuxbsd.editor.x86_64 --headless --export-release
        "Android Release" output.apk
    ndk: r28b
